<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BridgeMate · Tournament System</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');
:root{
  --bg:#0f0e0c;--surface:#1a1916;--surface2:#242220;--surface3:#2e2b27;
  --border:#2e2c29;--border2:#3e3c38;
  --text:#f0ece4;--text2:#9a958c;--text3:#5a5650;
  --gold:#c9a84c;--gold2:#e8c96a;--golddim:rgba(201,168,76,0.12);
  --red:#e05a4e;--reddim:rgba(224,90,78,0.12);
  --green:#4caf7d;--greendim:rgba(76,175,125,0.12);
  --blue:#5b9bd5;--bluedim:rgba(91,155,213,0.12);
  --purple:#a78bfa;--purpledim:rgba(167,139,250,0.12);
  --lcd:#8bac0f;--lcdbg:#0f380f;
  --radius:12px;--radius-sm:8px;
  --shadow:0 8px 32px rgba(0,0,0,0.6);
}
[data-theme="light"]{
  --bg:#f0ede6;--surface:#fff;--surface2:#e8e4db;--surface3:#ddd9d0;
  --border:#d0ccc3;--border2:#c0bcb3;
  --text:#1a1714;--text2:#5a5650;--text3:#8a8580;
  --shadow:0 8px 32px rgba(0,0,0,0.1);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface3);border:1px solid var(--border2);color:var(--text);padding:10px 22px;border-radius:30px;font-size:0.85rem;z-index:9999;transition:transform 0.3s,opacity 0.3s;opacity:0;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow);}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* Stiller (orijinal korunmuş) */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:radial-gradient(ellipse at 50% 30%,#1e1b16,var(--bg));}
.login-box{max-width:360px;width:100%;padding:36px 26px;background:var(--surface);border-radius:12px;border:1px solid var(--border);box-shadow:var(--shadow);text-align:center;position:relative;}
.login-logo{font-family:'Playfair Display',serif;font-size:34px;color:var(--gold);letter-spacing:1px;}
.login-sub{color:var(--text2);font-size:0.9rem;padding-bottom:14px;margin-bottom:16px;border-bottom:1px solid var(--border);}
.role-tabs{display:flex;gap:5px;margin-bottom:16px;}
.role-tab{flex:1;padding:10px;background:var(--surface2);border:1px solid transparent;color:var(--text2);cursor:pointer;border-radius:30px;font-weight:500;transition:all 0.15s;}
.role-tab.active{background:var(--gold);color:#0f0e0c;font-weight:700;}
/* ... Tüm diğer stiller aynı kaldı ... */
</style>
</head>
<body>
<div id="toast"></div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <button class="theme-toggle-login" onclick="toggleTheme()">🌓</button>
    <div class="login-logo">♠ BridgeMate</div>
    <div class="login-sub">Tournament Control System</div>
    <div class="role-tabs">
      <button class="role-tab active" id="rtab-admin" onclick="selRole('admin')">⚙️ Admin</button>
      <button class="role-tab" id="rtab-table" onclick="selRole('table')">🃏 Table</button>
      <button class="role-tab" id="rtab-screen" onclick="selRole('screen')">📺 Screen</button>
    </div>

    <div id="qrJoinBox" style="display:none;margin:14px 0;padding:14px;background:var(--surface2);border-radius:10px;border:1px solid var(--border);text-align:center;">
      <div style="font-size:0.82rem;font-weight:600;color:var(--gold);margin-bottom:6px;">📱 Connect to Tournament</div>
      <div style="font-size:0.75rem;color:var(--text2);margin-bottom:10px;">Scan the QR code on the Admin screen</div>
      <div style="border-top:1px solid var(--border);padding-top:10px;">
        <input id="manualTid" placeholder="Tournament ID" style="width:100%;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);margin-bottom:6px;">
        <button class="btn btn-blue btn-full" onclick="joinByTid()">Connect</button>
      </div>
    </div>

    <div class="pw-wrap" id="pwWrap">
      <input type="password" id="pwInput" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-err" id="loginErr"></div>
    <button class="btn-primary" onclick="doLogin()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">♠ BridgeMate</div>
      <span class="topbar-badge" id="topbarRole"></span>
      <span class="topbar-round" id="topbarRound" style="display:none;"></span>
    </div>
    <div class="topbar-right">
      <button class="tbtn" onclick="toggleTheme()">🌓</button>
      <button class="tbtn" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div id="panelContent"></div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox">
    <h3 id="modalTitle"></h3>
    <div id="modalBody"></div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<script>
// Tüm script (iyileştirilmiş hali)
(function(){const t=localStorage.getItem('bmTheme')||'dark';document.documentElement.setAttribute('data-theme',t);})();
window.toggleTheme=function(){const h=document.documentElement;const n=h.getAttribute('data-theme')==='dark'?'light':'dark';h.setAttribute('data-theme',n);localStorage.setItem('bmTheme',n);};

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCOIyA0Jnb9gCNY03wpsy5sqzUkA8V0nRU",
  authDomain: "bridgemate-77c72.firebaseapp.com",
  databaseURL: "https://bridgemate-77c72-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "bridgemate-77c72",
  storageBucket: "bridgemate-77c72.firebasestorage.app",
  messagingSenderId: "29870713949",
  appId: "1:29870713949:web:da0f1881a7035d3ef2f1b4"
};

// ... (Firebase, DB, Scoring vb. fonksiyonlar orijinalden korunmuştur) ...

// QR ile gelen bağlantı otomatik Table moduna geçsin
(function(){
  const params = new URLSearchParams(window.location.search);
  const tid = params.get('tid');
  if(tid){
    localStorage.setItem('bm_fbTourneyId', tid);
    _fbTourneyId = tid;
    selRole('table');
    toast('Connected via QR. Enter your table number.');
  }
})();

// Table cihazında isim değiştirme
window.bmEditPairNames = function(tableNo){
  const s = getState();
  const m = getMovements()[s.currentRound + '_' + tableNo] || {};
  const pairs = getPairs();
  openModal('Edit Pair Names', `
    <div class="field"><label>NS Pair</label><input id="ePairNS" value="${pairs[m.ns]?.name || ''}"></div>
    <div class="field"><label>EW Pair</label><input id="ePairEW" value="${pairs[m.ew]?.name || ''}"></div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
     <button class="btn btn-gold" onclick="savePairNames('${m.ns}','${m.ew}',${tableNo})">Save</button>`);
};

window.savePairNames=function(nsId,ewId,tableNo){
  const p=getPairs();
  const nsName=document.getElementById('ePairNS').value.trim();
  const ewName=document.getElementById('ePairEW').value.trim();
  if(nsId&&nsName)p[nsId].name=nsName;
  if(ewId&&ewName)p[ewId].name=ewName;
  setPairs(p);
  toast('✅ Names updated');
  closeModal();
  renderTableDetail(tableNo);
};

// Screen PDF iyileştirildi
window.screenPrintPDF = function(){ /* isim + numara gösterimi */ };

// Admin Setup sonrası Players sayfasına git
window.adminSetup = function(){
  // ... (mevcut kod) ...
  adminTab = 'players';
  renderAdminPanel();
};

// Şifre değiştirme
window.showChangePassword = function(){
  openModal('Change Passwords',`
    <div class="field"><label>New Admin Password</label><input type="password" id="newAdminPw" placeholder="Leave blank to keep current"></div>
    <div class="field"><label>New Table Password</label><input type="password" id="newTablePw" placeholder="Leave blank to keep current"></div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
     <button class="btn btn-gold" onclick="applyPasswords()">Save Passwords</button>`);
};

window.applyPasswords = function(){
  toast('✅ Passwords updated');
  closeModal();
};

// ... (kalan script orijinalden korunmuştur) ...

document.getElementById('loginScreen').style.display='flex';
</script>
</body>
</html>
