<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BridgeMate · Tournament System</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');

/* ── TOKENS ── */
:root{
  --bg:#0f0e0c; --surface:#1a1916; --surface2:#242220; --surface3:#2e2b27;
  --border:#2e2c29; --border2:#3e3c38;
  --text:#f0ece4; --text2:#9a958c; --text3:#5a5650;
  --gold:#c9a84c; --gold2:#e8c96a; --golddim:rgba(201,168,76,0.12);
  --red:#e05a4e; --reddim:rgba(224,90,78,0.12);
  --green:#4caf7d; --greendim:rgba(76,175,125,0.12);
  --blue:#5b9bd5; --bluedim:rgba(91,155,213,0.12);
  --purple:#a78bfa; --purpledim:rgba(167,139,250,0.12);
  --orange:#f59e0b; --orangedim:rgba(245,158,11,0.12);
  --lcd:#8bac0f; --lcdbg:#0f380f;
  --radius:12px; --radius-sm:8px; --radius-xs:5px;
  --shadow:0 8px 32px rgba(0,0,0,0.6);
  --transition:0.15s ease;
}
[data-theme="light"]{
  --bg:#f0ede6; --surface:#fff; --surface2:#e8e4db; --surface3:#ddd9d0;
  --border:#d0ccc3; --border2:#c0bcb3;
  --text:#1a1714; --text2:#5a5650; --text3:#8a8580;
  --shadow:0 8px 32px rgba(0,0,0,0.1);
}

/* ── RESET ── */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;-webkit-tap-highlight-color:transparent;}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface3);border:1px solid var(--border2);color:var(--text);padding:10px 22px;border-radius:30px;font-size:0.85rem;z-index:9999;transition:transform 0.3s,opacity 0.3s;opacity:0;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow);}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* ── LOGIN ── */
#loginScreen{display:none;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:radial-gradient(ellipse at 50% 30%,#1e1b16,var(--bg));}
[data-theme="light"] #loginScreen{background:radial-gradient(ellipse at 50% 30%,#e0dbd2,var(--bg));}
.login-box{max-width:360px;width:100%;padding:36px 26px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);text-align:center;position:relative;}
.login-logo{font-family:'Playfair Display',serif;font-size:34px;color:var(--gold);letter-spacing:1px;margin-bottom:4px;}
.login-sub{color:var(--text2);font-size:0.8rem;padding-bottom:14px;margin-bottom:16px;border-bottom:1px solid var(--border);}
.role-tabs{display:flex;gap:5px;margin-bottom:16px;}
.role-tab{flex:1;padding:8px 0;background:var(--surface2);border:1px solid transparent;color:var(--text2);cursor:pointer;border-radius:30px;font-weight:500;font-size:0.76rem;transition:all var(--transition);font-family:inherit;}
.role-tab.active{background:var(--gold);color:#0f0e0c;font-weight:700;border-color:var(--gold);}
.pw-wrap{margin-bottom:8px;}
.pw-wrap input{width:100%;padding:11px 16px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:0.95rem;outline:none;text-align:center;letter-spacing:3px;font-family:inherit;}
.pw-wrap input:focus{border-color:var(--gold);}
.login-err{color:var(--red);font-size:0.76rem;min-height:18px;margin-bottom:6px;}
.btn-primary{width:100%;padding:12px;background:var(--gold);border:none;border-radius:30px;cursor:pointer;font-weight:700;font-size:0.92rem;color:#0f0e0c;box-shadow:0 4px 0 #7a6a33;font-family:inherit;transition:all var(--transition);}
.btn-primary:active{transform:translateY(3px);box-shadow:0 1px 0 #7a6a33;}
.theme-toggle-login{position:absolute;top:12px;right:12px;background:none;border:1px solid var(--border);border-radius:20px;padding:4px 10px;cursor:pointer;font-size:0.75rem;color:var(--text2);font-family:inherit;}

/* ── APP SHELL ── */
#app{display:none;flex:1;flex-direction:column;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;gap:8px;}
.topbar-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.topbar-logo{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold);cursor:pointer;}
.topbar-badge{font-size:0.66rem;padding:2px 8px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);color:var(--text3);}
.topbar-round{font-size:0.72rem;color:var(--gold);background:var(--golddim);padding:2px 9px;border-radius:10px;border:1px solid rgba(201,168,76,0.2);}
.topbar-right{display:flex;gap:5px;align-items:center;}
.tbtn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:5px 12px;border-radius:20px;font-size:0.78rem;cursor:pointer;font-family:inherit;transition:background var(--transition);}
.tbtn:active{background:var(--border);}
#panelContent{padding:14px;flex:1;max-width:960px;margin:0 auto;width:100%;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.panel-anim{animation:fadeUp 0.22s ease;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:8px 16px;border-radius:30px;border:none;cursor:pointer;font-weight:600;font-size:0.82rem;transition:all var(--transition);font-family:inherit;white-space:nowrap;}
.btn:active{opacity:0.75;transform:scale(0.97);}
.btn-gold{background:var(--gold);color:#0f0e0c;}
.btn-green{background:var(--green);color:#fff;}
.btn-red{background:var(--red);color:#fff;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-purple{background:var(--purple);color:#fff;}
.btn-orange{background:var(--orange);color:#0f0e0c;}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.btn-sm{padding:4px 10px;font-size:0.72rem;}
.btn-full{width:100%;}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}

/* ── CARDS / FIELDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 14px;margin-bottom:12px;}
.card-title{font-size:0.72rem;font-weight:600;color:var(--text3);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.field{margin-bottom:10px;}
.field label{display:block;font-size:0.72rem;color:var(--text2);margin-bottom:3px;font-weight:500;}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:0.9rem;outline:none;font-family:inherit;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold);}
.field select option{background:var(--surface);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:200;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(3px);}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:20px 16px;max-width:440px;width:100%;box-shadow:var(--shadow);max-height:90vh;overflow-y:auto;}
.modal h3{color:var(--gold);margin-bottom:14px;font-size:0.95rem;}
.modal-actions{display:flex;gap:7px;margin-top:14px;flex-wrap:wrap;}
.modal-actions .btn{flex:1;}

/* ── LCD ── */
.bm-device{max-width:340px;margin:0 auto;padding:10px 0;}
.bm-lcd{background:var(--lcdbg);border:3px solid #2a4a0a;border-radius:6px;padding:10px 12px;font-family:'Share Tech Mono',monospace;margin-bottom:14px;box-shadow:inset 0 2px 8px rgba(0,0,0,0.5),0 0 12px rgba(139,172,15,0.08);}
.bm-lcd-row{font-size:0.78rem;color:var(--lcd);letter-spacing:0.5px;line-height:1.75;white-space:pre;}
.bm-lcd-row.inv{background:var(--lcd);color:var(--lcdbg);padding:0 2px;}
.bm-lcd-row.dim{opacity:0.5;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.25}}
.blink{animation:blink 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* ── SUIT BUTTONS ── */
.bm-suit-row{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:10px;}
.bm-suit-btn{padding:10px 4px;background:var(--surface2);border:2px solid var(--border);border-radius:6px;cursor:pointer;text-align:center;font-size:1.1rem;font-weight:700;transition:all 0.12s;font-family:inherit;color:var(--text);}
.bm-suit-btn.red{color:var(--red);}
.bm-suit-btn.active{border-color:var(--gold);background:var(--golddim);}
.bm-suit-btn.red.active{border-color:var(--red);background:var(--reddim);}
.bm-suit-btn.nt.active{border-color:var(--blue);background:var(--bluedim);}

/* ── KEYPAD ── */
.bm-keypad{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:10px;}
.bm-key{padding:10px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;cursor:pointer;text-align:center;font-size:0.82rem;font-weight:600;color:var(--text2);transition:all 0.12s;font-family:inherit;line-height:1.2;}
.bm-key:active{background:var(--border);}
.bm-key.active{background:var(--gold);color:#0f0e0c;border-color:var(--gold);}
.bm-key.red-key{color:var(--red);}
.bm-key.red-key.active{background:var(--red);color:#fff;border-color:var(--red);}
.bm-key.blue-key{color:var(--blue);}
.bm-key.blue-key.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.bm-key.green-key{color:var(--green);}
.bm-key.green-key.active{background:var(--green);color:#fff;border-color:var(--green);}
.bm-key.wide{grid-column:span 2;}
.bm-key.wider{grid-column:span 3;}
.bm-key.full{grid-column:span 5;}
.bm-key-sub{font-size:0.55rem;color:var(--text3);margin-top:1px;display:block;}

/* ── LEAD / RESULT ── */
.lead-row{display:flex;gap:6px;margin-bottom:10px;align-items:center;}
.lead-row label{font-size:0.72rem;color:var(--text2);white-space:nowrap;}
.lead-suit-btns{display:flex;gap:4px;}
.lead-suit-btn{width:34px;height:34px;border:1px solid var(--border);background:var(--surface2);border-radius:5px;cursor:pointer;font-size:1rem;text-align:center;line-height:32px;font-family:inherit;}
.lead-suit-btn.active{border-color:var(--gold);background:var(--golddim);}
.lead-suit-btn.red.active{border-color:var(--red);background:var(--reddim);}
.lead-rank-select{flex:1;padding:6px 8px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:0.82rem;outline:none;font-family:inherit;}
.lead-rank-select:focus{border-color:var(--gold);}
.result-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.result-btn{width:36px;height:36px;border:1px solid var(--border);background:var(--surface2);border-radius:5px;cursor:pointer;font-size:1.1rem;color:var(--text2);font-family:inherit;}
.result-btn:active{background:var(--border);}
.result-disp{font-size:1.3rem;font-weight:700;color:var(--gold);min-width:52px;text-align:center;font-family:'Share Tech Mono',monospace;}
.result-label{font-size:0.76rem;color:var(--text2);flex:1;}

/* ── SCORE PREVIEW ── */
.score-preview{background:var(--lcdbg);border:1px solid #2a4a0a;border-radius:6px;padding:8px 12px;text-align:center;margin-bottom:10px;font-family:'Share Tech Mono',monospace;}
.sp-label{font-size:0.65rem;color:var(--lcd);opacity:0.7;margin-bottom:2px;}
.sp-val{font-size:1.4rem;font-weight:700;color:var(--lcd);}
.sp-val.pos{color:var(--green);}
.sp-val.neg{color:var(--red);}

/* ── PAIR CONFIRM ── */
.pair-confirm{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.pair-box{border-radius:var(--radius-sm);padding:12px;text-align:center;}
.pair-box-ns{background:var(--bluedim);border:1px solid rgba(91,155,213,0.25);}
.pair-box-ew{background:var(--golddim);border:1px solid rgba(201,168,76,0.25);}
.pb-label{font-size:0.62rem;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
.pair-box-ns .pb-label{color:var(--blue);}
.pair-box-ew .pb-label{color:var(--gold);}
.pb-num{font-size:1.5rem;font-weight:900;font-family:'Playfair Display',serif;line-height:1;}
.pb-name{font-size:0.82rem;font-weight:600;margin-top:3px;line-height:1.3;}
.pb-dir{font-size:0.7rem;color:var(--text3);}

/* ── BOARD ITEMS ── */
.board-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--surface2);border-radius:6px;margin-bottom:5px;border:1px solid transparent;gap:6px;}
.board-item.done{border-color:rgba(76,175,125,0.25);background:var(--greendim);}
.board-item.pending{border-color:rgba(201,168,76,0.4);background:var(--golddim);}
.board-item.active{border-color:var(--gold);cursor:pointer;}
.bi-num{font-size:0.8rem;font-weight:700;color:var(--text3);min-width:54px;}
.bi-contract{font-size:0.82rem;flex:1;font-family:'Share Tech Mono',monospace;}
.bi-score{font-weight:700;font-size:0.85rem;min-width:46px;text-align:right;font-family:'Share Tech Mono',monospace;}

/* ── ROUND OVER / WAITING ── */
.round-over-screen{background:linear-gradient(135deg,rgba(201,168,76,0.06),rgba(91,155,213,0.04));border:2px solid var(--gold);border-radius:var(--radius);padding:24px;text-align:center;}
.ro-badge{font-size:3rem;margin-bottom:8px;}
.ro-title{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--gold);margin-bottom:6px;}
.ro-sub{font-size:0.82rem;color:var(--text2);margin-bottom:20px;}
.ro-move-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;text-align:left;}
.ro-move-label{font-size:0.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.ro-move-main{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:2px;}
.ro-move-sub{font-size:0.78rem;color:var(--text2);}

.waiting-screen{text-align:center;padding:30px 20px;}
.waiting-icon{font-size:3rem;animation:pulse 2s infinite;margin-bottom:12px;}
.waiting-title{font-size:1.1rem;font-weight:700;margin-bottom:6px;}
.waiting-sub{font-size:0.82rem;color:var(--text2);}

.approval-screen{background:var(--surface);border:2px solid var(--gold);border-radius:var(--radius);padding:20px;text-align:center;margin-bottom:12px;}
.approval-title{font-size:0.7rem;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.approval-contract{font-family:'Share Tech Mono',monospace;font-size:1.5rem;font-weight:700;color:var(--text);margin-bottom:4px;}
.approval-score{font-size:2rem;font-weight:900;font-family:'Playfair Display',serif;margin-bottom:14px;}
.approval-waiting{font-size:0.78rem;color:var(--text3);margin-bottom:14px;animation:blink 1.5s infinite;}

/* ── TRAVELLER / COMPARISON ── */
.traveller-table{width:100%;border-collapse:collapse;font-size:0.78rem;margin-top:8px;}
.traveller-table th{padding:5px 7px;text-align:left;font-size:0.65rem;font-weight:700;color:var(--text3);letter-spacing:0.5px;text-transform:uppercase;border-bottom:1px solid var(--border2);}
.traveller-table td{padding:6px 7px;border-bottom:1px solid var(--border);}
.traveller-table tr.highlight{background:var(--golddim);}
.traveller-table tr:hover td{background:var(--surface2);}

/* ── SCOREBOARD ── */
.scoreboard{max-width:740px;margin:0 auto;}
.sb-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:6px;}
.sb-title{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--gold);}
.live-pill{display:inline-flex;align-items:center;gap:4px;font-size:0.7rem;color:var(--green);background:var(--greendim);padding:3px 9px;border-radius:10px;border:1px solid rgba(76,175,125,0.2);}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 1.5s infinite;flex-shrink:0;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:14px;}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 10px;text-align:center;}
.stat-box .sv{font-size:1.3rem;font-weight:700;color:var(--gold);}
.stat-box .sl{font-size:0.64rem;color:var(--text3);}
.sb-tabs{display:flex;gap:4px;margin-bottom:10px;background:var(--surface);border-radius:30px;padding:3px;border:1px solid var(--border);overflow-x:auto;}
.sb-tab{flex:1;padding:6px 8px;border:none;background:transparent;color:var(--text2);border-radius:26px;cursor:pointer;font-size:0.73rem;font-weight:500;transition:all var(--transition);white-space:nowrap;font-family:inherit;}
.sb-tab.active{background:var(--gold);color:#0f0e0c;font-weight:700;}
.sb-table{width:100%;border-collapse:collapse;}
.sb-table thead tr{border-bottom:2px solid var(--border2);}
.sb-table th{padding:7px 9px;text-align:left;font-size:0.65rem;font-weight:700;color:var(--text3);letter-spacing:0.5px;text-transform:uppercase;}
.sb-table tbody tr{border-bottom:1px solid var(--border);transition:background var(--transition);}
.sb-table tbody tr:hover{background:var(--surface2);}
.sb-table td{padding:9px 9px;font-size:0.85rem;}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;font-weight:700;font-size:0.75rem;}
.r1{background:var(--gold);color:#0f0e0c;}.r2{background:#9aa3b2;color:#0f0e0c;}.r3{background:#c17c3e;color:#fff;}.rn{background:var(--surface2);color:var(--text2);}
.mp-pill{display:inline-block;padding:2px 10px;border-radius:20px;font-weight:700;font-size:0.8rem;}
.mp-high{background:var(--greendim);color:var(--green);}.mp-mid{background:var(--golddim);color:var(--gold);}.mp-low{background:var(--reddim);color:var(--red);}
.pct-bar-bg{background:var(--surface2);border-radius:3px;height:3px;margin-top:3px;}
.pct-bar{height:3px;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width 0.5s;}

/* ── ADMIN ── */
.admin-wrap{max-width:700px;margin:0 auto;}
.admin-tabs{display:flex;gap:4px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.admin-tabs::-webkit-scrollbar{display:none;}
.admin-tab{padding:7px 14px;border:1px solid var(--border);background:var(--surface2);border-radius:30px;color:var(--text2);cursor:pointer;font-size:0.75rem;font-weight:500;white-space:nowrap;transition:all var(--transition);font-family:inherit;}
.admin-tab.active{background:var(--gold);color:#0f0e0c;border-color:var(--gold);font-weight:700;}
.table-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px;}
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;}
.tc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.tc-num{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--gold);}
.tc-status{font-size:0.68rem;padding:2px 8px;border-radius:10px;}
.tc-done{background:var(--greendim);color:var(--green);}
.tc-playing{background:var(--golddim);color:var(--gold);}
.tc-waiting{background:var(--surface2);color:var(--text3);}

/* ── MOVEMENT TABLE ── */
.movement-full{overflow-x:auto;margin-top:8px;}
.mv-table{width:100%;border-collapse:collapse;font-size:0.78rem;}
.mv-table th{padding:5px 8px;text-align:left;font-size:0.65rem;font-weight:700;color:var(--text3);letter-spacing:0.5px;text-transform:uppercase;border-bottom:1px solid var(--border2);}
.mv-table td{padding:6px 8px;border-bottom:1px solid var(--border);}
.mv-table tr:hover td{background:var(--surface2);}

function fbSubscribe(key){

  if(_fbListeners[key]){

  }

  });
}

  Object.entries(_fbListeners).forEach(([key,fn])=>{
    if(_fbDb&&_fbTourneyId){

// ══════════════════════════════════════════════════════
//  BRIDGE SCORING
// ══════════════════════════════════════════════════════
const SUIT_VAL={'♣':20,'♦':20,'♥':30,'♠':30,'NT':30};
const SUIT_FIRST={'♣':20,'♦':20,'♥':30,'♠':30,'NT':40};
const IMP_TABLE=[10,40,80,120,160,210,260,310,360,420,490,590,740,890,1090,1290,1490,1740,1990,2240,2490,2990,3490,3990];

function calcScore(level,suit,declarer,result,vuln,doubled){
  const isNS=declarer==='N'||declarer==='S';
  const isVuln=(isNS&&(vuln==='NS'||vuln==='Both'))||(!isNS&&(vuln==='EW'||vuln==='Both'));
  const dbl=doubled==='XX'?4:doubled==='X'?2:1;
  if(result<0){
    const u=Math.abs(result);let pen=0;
    if(dbl===1){pen=u*(isVuln?100:50);}
    else if(dbl===2){pen=!isVuln?(u===1?100:u===2?300:500+(u-3)*300):(u===1?200:u===2?500:800+(u-3)*300);}
    else{pen=!isVuln?(u===1?200:u===2?600:1000+(u-3)*600):(u===1?400:u===2?1000:1600+(u-3)*600);}
    return isNS?-pen:pen;
  }
  let trick=SUIT_FIRST[suit]+(level-1)*SUIT_VAL[suit];
  if(dbl>1) trick=trick*dbl+(dbl===2?50:100);
  const isGame=trick>=100;const isSlam=level>=6;const isGrand=level===7;
  let bonus=0;
  if(isGrand) bonus=isVuln?1500:1000;
  else if(isSlam) bonus=isVuln?750:500;
  else if(isGame) bonus=isVuln?500:300;
  else bonus=50;
  if(dbl>1) bonus+=(dbl===2?50:100);
  const overtrick=result>0?(isVuln?dbl===1?30:dbl===2?200:400:dbl===1?30:dbl===2?100:200)*result:0;
  const total=trick+bonus+overtrick;
  return isNS?total:-total;
}

function getVuln(boardNo){
  const cycle=((boardNo-1)%16)+1;
  const vulnMap={1:'None',2:'NS',3:'EW',4:'Both',5:'NS',6:'EW',7:'Both',8:'None',9:'EW',10:'Both',11:'None',12:'NS',13:'Both',14:'None',15:'NS',16:'EW'};
  return vulnMap[cycle]||'None';
}

function scoreToIMP(diff){
  const d=Math.abs(diff);let imp=0;
  for(let i=0;i<IMP_TABLE.length;i++){if(d<IMP_TABLE[i]){imp=i;break;}if(i===IMP_TABLE.length-1)imp=24;}
  return diff>=0?imp:-imp;
}

// ══════════════════════════════════════════════════════
//  MATCHPOINT / IMP CALCULATION
// ══════════════════════════════════════════════════════
function calcMP(boardsData,movementsData){
  const boards=boardsData||getBoards();
  const movements=movementsData||getMovements();
  const boardScores={};
  Object.entries(boards).forEach(([key,b])=>{
    if(b.status!=='done') return;
    const[t,r,bn]=key.split('_');
    if(!boardScores[bn]) boardScores[bn]=[];
    const m=movements[r+'_'+t]||{};
    if(typeof b.nsScore!=='number') return;
    boardScores[bn].push({ns:m.ns,ew:m.ew,nsScore:b.nsScore,adjusted:b.adjusted});
  });
  const pairMP={};
  Object.entries(boardScores).forEach(([,scores])=>{
    const n=scores.length;if(n<2) return;
    const top=(n-1)*2;
    scores.forEach(s=>{
      let nsMP=0,ewMP=0;
      if(s.adjusted){
        // Average+ = 60%, Average = 50%, Average- = 40%
        const adj=s.adjValue||50;
        nsMP=top*adj/100; ewMP=top*(100-adj)/100;
      } else {
        scores.forEach(s2=>{
          if(s===s2) return;
          if(s2.adjusted) return; // skip adjusted in comparison
          if(s.nsScore>s2.nsScore){nsMP+=2;}
          else if(s.nsScore===s2.nsScore){nsMP+=1;ewMP+=1;}
          else{ewMP+=2;}
        });
      }
      if(s.ns){if(!pairMP[s.ns])pairMP[s.ns]={mp:0,boards:0,top:0};pairMP[s.ns].mp+=nsMP;pairMP[s.ns].boards++;pairMP[s.ns].top+=top;}
      if(s.ew){if(!pairMP[s.ew])pairMP[s.ew]={mp:0,boards:0,top:0};pairMP[s.ew].mp+=ewMP;pairMP[s.ew].boards++;pairMP[s.ew].top+=top;}
    });
  });
  return pairMP;
}

function calcIMP(boardsData,movementsData){
  const boards=boardsData||getBoards();
  const movements=movementsData||getMovements();
  const pairIMP={};
  // Butler: compare each score against datum (average)
  const boardScores={};
  Object.entries(boards).forEach(([key,b])=>{
    if(b.status!=='done') return;
    const[t,r,bn]=key.split('_');
    if(!boardScores[bn]) boardScores[bn]=[];
    const m=movements[r+'_'+t]||{};
    if(typeof b.nsScore!=='number') return;
    boardScores[bn].push({ns:m.ns,ew:m.ew,nsScore:b.nsScore});
  });
  Object.entries(boardScores).forEach(([,scores])=>{
    const n=scores.length;if(n<2) return;
    const datum=Math.round(scores.reduce((a,s)=>a+s.nsScore,0)/n);
    scores.forEach(s=>{
      const nsIMP=scoreToIMP(s.nsScore-datum);
      if(s.ns){if(!pairIMP[s.ns])pairIMP[s.ns]={imp:0,boards:0};pairIMP[s.ns].imp+=nsIMP;pairIMP[s.ns].boards++;}
      if(s.ew){if(!pairIMP[s.ew])pairIMP[s.ew]={imp:0,boards:0};pairIMP[s.ew].imp-=nsIMP;pairIMP[s.ew].boards++;}
    });
  });
  return pairIMP;
}

// ══════════════════════════════════════════════════════
//  MOVEMENT GENERATORS
// ══════════════════════════════════════════════════════
function generateMitchell(tableCount,boardsPerRound,hasPhantom,totalBoards){
  const movements={};const pairs={};
  for(let i=1;i<=tableCount;i++) pairs['ns_'+i]={id:'ns_'+i,name:'NS '+i,dir:'NS',startTable:i,isPhantom:false};
  for(let i=1;i<=tableCount;i++) pairs['ew_'+i]={id:'ew_'+i,name:'EW '+i,dir:'EW',startTable:i,isPhantom:false};
  if(hasPhantom) pairs['phantom']={id:'phantom',name:'Phantom',dir:'EW',startTable:0,isPhantom:true};
  const rounds=tableCount;
  const totalBoardSets=Math.ceil(totalBoards/boardsPerRound);
  for(let r=1;r<=rounds;r++){
    for(let t=1;t<=tableCount;t++){
      const ewIdx=((t+r-2)%tableCount)+1;
      const boardSet=(((t-r)%tableCount+tableCount)%tableCount)%totalBoardSets;
      const boardStart=boardSet*boardsPerRound+1;
      const boardEnd=Math.min(boardStart+boardsPerRound-1,totalBoards);
      movements[r+'_'+t]={ns:'ns_'+t,ew:'ew_'+ewIdx,boardStart,boardEnd};
    }
  }
  return{movements,pairs,rounds};
}

function generateHowell(tableCount,boardsPerRound,totalBoards){
  const movements={};const pairs={};
  const pairCount=tableCount*2;
  const rounds=pairCount-1;
  for(let i=1;i<=pairCount;i++) pairs['p'+i]={id:'p'+i,name:'Pair '+i,dir:'',startTable:0,isPhantom:false};
  const totalBoardSets=Math.ceil(totalBoards/boardsPerRound);
  for(let r=1;r<=rounds;r++){
    const players=Array.from({length:pairCount},(_,i)=>i+1);
    const fixed=players[0];const rotating=players.slice(1);
    const rr=[...rotating.slice(r-1),...rotating.slice(0,r-1)];
    for(let t=1;t<=tableCount;t++){
      const p1=t===1?fixed:rr[t-1];
      const p2=rr[pairCount-1-t+1]||rr[0];
      const boardSet=((r+t-2)%totalBoardSets);
      const boardStart=boardSet*boardsPerRound+1;
      const boardEnd=Math.min(boardStart+boardsPerRound-1,totalBoards);
      const ns=t%2===1?'p'+p1:'p'+p2;
      const ew=t%2===1?'p'+p2:'p'+p1;
      movements[r+'_'+t]={ns,ew,boardStart,boardEnd};
    }
  }
  return{movements,pairs,rounds};
}

  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('topbarRole').textContent=role==='admin'?'Admin':role==='table'?'Table':'Screen';

  // Init Firebase
  if(!_fbOnline) initFirebase();

  const tid=getFBTourneyId();
  if(tid){
    _fbTourneyId=tid;
    // Show loading
    document.getElementById('panelContent').innerHTML=`
      <div class="waiting-screen" style="padding:80px 20px;">
        <div class="waiting-icon">⚡</div>
        <div class="waiting-title">Connecting...</div>
        <div class="waiting-sub">Loading tournament data</div>
      </div>`;
    try{
      await fbLoadAll();
    }catch(e){console.warn('fbLoadAll error:',e);}
    // Subscribe to live updates
    ['state','pairs','boards','movements','approvals','messages','timers'].forEach(k=>fbSubscribe(k));
  }

  refreshTopbar();

  // Resume table session
  if(role==='table'){
    const sess=getTableSession();
    if(sess&&sess.tid===_fbTourneyId){
      const s=getState();
      if(s&&s.status==='running'){
        bmTableNo=sess.tableNo;
        bmSide=sess.side||'ns';
        toast('📍 Resuming Table '+sess.tableNo);
        renderTableDetail(sess.tableNo);
        return;
      }
    }
  }
  renderPanel();
};

// Sound
function playSound(type){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    if(type==='ok'){osc.frequency.setValueAtTime(880,ctx.currentTime);osc.frequency.setValueAtTime(1100,ctx.currentTime+0.1);}
    else if(type==='alert'){osc.frequency.setValueAtTime(440,ctx.currentTime);osc.frequency.setValueAtTime(330,ctx.currentTime+0.15);}
    else{osc.frequency.setValueAtTime(660,ctx.currentTime);}
    gain.gain.setValueAtTime(0.3,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.3);
  }catch(e){}
}

  const grid=document.getElementById('namesGrid');

  const isHowell=document.getElementById('tMovement')?.value==='howell'||s.movement==='howell';

  if(isHowell){
    const pairCount=tableCount*2;
    for(let i=1;i<=pairCount;i++){
      const key='p'+i;
      const p=pairs[key]||{};

      </div>`;
    }
  } else {
    for(let i=1;i<=tableCount;i++){
      const nsk='ns_'+i; const ewk='ew_'+i;
      const ns=pairs[nsk]||{}; const ew=pairs[ewk]||{};
      html+=`<div class="pn-item">
        <span class="pn-badge pn-badge-ns">NS${i}</span>

    else if(p.id&&p.id.startsWith('ew_')) p.name='EW '+p.id.replace('ew_','');

window.adminStart=function(){
  if(_adminBusy){toast('Please wait...');return;}
  _adminBusy=true;
  const s=getState();
  if(!s.tableCount||s.tableCount<2){toast('❌ Set up tournament first');_adminBusy=false;return;}

  // Create tourneyId & set in Firebase
  const tid=makeTourneyId();
  setFBTourneyId(tid);
  // Resubscribe with new ID
  fbUnsubscribeAll();
  ['state','pairs','boards','movements','approvals','messages','timers'].forEach(k=>fbSubscribe(k));

  // Generate movement
  let gen;
  if(s.movement==='howell') gen=generateHowell(s.tableCount,s.boardsPerRound,s.totalBoards);
  else gen=generateMitchell(s.tableCount,s.boardsPerRound,s.phantom,s.totalBoards);

  // Apply saved names to generated pairs
  const savedPairs=getPairs();
  Object.entries(savedPairs).forEach(([key,p])=>{
    if(gen.pairs[key]&&p.name&&!p.name.match(/^(NS|EW)\s*\d+$/)&&!p.name.match(/^Pair\s*\d+$/)){
      gen.pairs[key].name=p.name;
    }
  });

  setMovements(gen.movements);
  setPairs(gen.pairs);
  setBoards({});
  setApprovals({});
  setMessages({});
  setState({...s,status:'running',currentRound:1,roundCount:gen.rounds});
  localStorage.setItem('bm_adminSessionSnap','1');

  addLog('ok','Tournament started',s.name+' | '+s.tableCount+' tables | '+s.movement);
  _adminBusy=false;
  toast('🚀 Tournament started!');
  playSound('ok');
  adminTab='overview';
  renderAdminPanel();
};

window.adminAdvanceRound=function(){
  const s=getState();

  if(!confirm('Advance to Round '+(s.currentRound+1)+'?')) return;
  setState({...s,currentRound:s.currentRound+1});
  addLog('ok','Round advanced','Round '+(s.currentRound+1));
  toast('▶ Round '+(s.currentRound+1)+' started');
  playSound('ok');
  renderAdminTab();
  // Start round timer if set
  if(s.timerMinutes>0) startRoundTimer(s.timerMinutes);
};

window.adminReset=function(){
  if(!confirm('⚠️ RESET tournament?\nAll scores and data will be deleted!')) return;
  if(!confirm('Are you sure? This cannot be undone.')) return;
  // Clear Firebase
  if(_fbDb&&_fbTourneyId){
    _fbDb.ref('tournaments/'+_fbTourneyId).remove().catch(()=>{});
  }
  // Clear localStorage
  ['state','pairs','boards','movements','approvals','messages','timers','logs'].forEach(k=>{
    localStorage.removeItem('bm_'+k);
    delete _fbCache[k];
  });
  localStorage.removeItem('bm_fbTourneyId');
  _fbTourneyId=null;

  addLog('warn','Tournament reset','All data cleared');

};

window.adminExport=function(){

  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});

window.adminImport=function(){
  const input=document.createElement('input');input.type='file';input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(data.state) setState(data.state);
        if(data.pairs) setPairs(data.pairs);
        if(data.boards) setBoards(data.boards);
        if(data.movements) setMovements(data.movements);
        toast('✅ Backup imported');
        renderAdminPanel();
      }catch(e){toast('❌ Invalid backup file');}
    };
    reader.readAsText(file);
  };
  input.click();
};

function renderOverviewTab(){

    const ns=pairs[m.ns]||{name:m.ns||'?'};const ew=pairs[m.ew]||{name:m.ew||'?'};
    const bkeys=[];
    for(let b=m.boardStart||1;b<=(m.boardEnd||3);b++) bkeys.push(t+'_'+s.currentRound+'_'+b);

  const doneBoards=Object.values(boards).filter(b=>b.status==='done').length;

  return`

window.adminBroadcast=function(){
  const msg=document.getElementById('broadcastMsg')?.value.trim();
  if(!msg){toast('Enter a message');return;}
  setMessages({text:msg,id:Date.now(),time:new Date().toLocaleTimeString()});
  document.getElementById('broadcastMsg').value='';
  toast('📢 Broadcast sent');
  addLog('ok','Broadcast sent',msg);
};

let roundTimerInterval=null;
let roundTimerEnd=null;

window.adminStartTimer=function(){
  const mins=parseInt(document.getElementById('timerMins')?.value||7);
  roundTimerEnd=Date.now()+mins*60000;
  if(roundTimerInterval) clearInterval(roundTimerInterval);
  DB.set('timers',{end:roundTimerEnd,mins});
  roundTimerInterval=setInterval(updateTimerDisplay,1000);
  updateTimerDisplay();
  toast('⏱ Timer started: '+mins+' min');
};

window.adminStopTimer=function(){
  if(roundTimerInterval){clearInterval(roundTimerInterval);roundTimerInterval=null;}
  roundTimerEnd=null;
  DB.del('timers');
  const el=document.getElementById('roundTimerDisplay');
  if(el) el.innerHTML='';
  toast('Timer stopped');
};

function updateTimerDisplay(){
  if(!roundTimerEnd) return;
  const remaining=Math.max(0,roundTimerEnd-Date.now());
  const mins=Math.floor(remaining/60000);
  const secs=Math.floor((remaining%60000)/1000);
  const str=mins+':'+String(secs).padStart(2,'0');
  const isWarning=remaining<120000;
  const el=document.getElementById('roundTimerDisplay');
  if(el) el.innerHTML=`<div class="round-timer ${isWarning?'warning':''}">${str}</div>`;
  if(remaining===0){
    clearInterval(roundTimerInterval);roundTimerInterval=null;
    playSound('alert');
    toast('⏰ Time is up!',4000);
  }
}

function renderResultsTab(){
  const s=getState();const pairs=getPairs();const boards=getBoards();const movements=getMovements();
  const isIMP=s.scoring==='IMP';
  const scoreData=isIMP?calcIMP():calcMP();
  const allPairs=Object.values(pairs).filter(p=>!p.isPhantom).map(p=>{
    const d=scoreData[p.id]||{mp:0,boards:0,top:0,imp:0};
    const pct=!isIMP&&d.top>0?(d.mp/d.top*100).toFixed(1):0;
    return{...p,...d,pct:parseFloat(pct)};
  }).sort((a,b)=>isIMP?(b.imp-a.imp):(b.pct-a.pct));

  const rows=allPairs.map((p,i)=>{
    const badge=i===0?'r1':i===1?'r2':i===2?'r3':'rn';
    const scoreDisp=isIMP?(p.imp>=0?'+':'')+p.imp+' IMPs':`${p.mp} MP (${p.pct}%)`;
    const mpClass=!isIMP?(p.pct>=60?'mp-high':p.pct>=45?'mp-mid':'mp-low'):'';
    return`<tr>
      <td><span class="rank-badge ${badge}">${i+1}</span></td>
      <td style="font-weight:600;">${p.name}</td>
      <td style="color:${p.dir==='NS'?'var(--blue)':'var(--gold)'};">${p.dir||'—'}</td>
      <td><span class="mp-pill ${mpClass}">${scoreDisp}</span></td>
      <td style="font-size:0.75rem;color:var(--text3);">${p.boards||0} boards</td>
    </tr>`;
  }).join('');

  const doneKeys=Object.keys(boards).filter(k=>boards[k].status==='done').sort();
  const boardRows=doneKeys.slice(0,60).map(k=>{
    const bd=boards[k];const[t,r,b]=k.split('_');
    const m=movements[r+'_'+t]||{};
    const ns=pairs[m.ns]||{name:'?'};const ew=pairs[m.ew]||{name:'?'};
    const sc=typeof bd.nsScore==='number'?(bd.nsScore>0?'+':'')+bd.nsScore:'?';
    return`<tr>
      <td style="color:var(--text3);font-size:0.7rem;">T${t}/R${r}/B${b}</td>
      <td style="color:var(--blue);font-size:0.75rem;">${ns.name}</td>
      <td style="color:var(--gold);font-size:0.75rem;">${ew.name}</td>
      <td style="font-family:'Share Tech Mono',monospace;font-size:0.75rem;">${bd.contract||'PASS'}${bd.adjusted?'<span class="adj-badge">ADJ</span>':''}</td>
      <td style="font-weight:700;color:${typeof bd.nsScore==='number'?(bd.nsScore>0?'var(--green)':'var(--red)'):'var(--purple)'};">${sc}</td>
    </tr>`;
  }).join('');

  return`
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <div class="card-title" style="margin:0;"><span>🏆</span> Rankings — ${s.scoring}</div>
      <button class="btn btn-blue btn-sm" onclick="adminPrintResults()">🖨 PDF</button>
    </div>
    <table class="sb-table">
      <thead><tr><th>#</th><th>Pair</th><th>Dir</th><th>Score</th><th>Boards</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="5" style="text-align:center;color:var(--text3);">No results yet</td></tr>'}</tbody>
    </table>
  </div>
  ${doneKeys.length?`<div class="card">
    <div class="card-title"><span>📊</span> Board Results (${doneKeys.length})</div>
    <div class="movement-full">
      <table class="mv-table">
        <thead><tr><th>T/R/B</th><th>NS</th><th>EW</th><th>Contract</th><th>NS Score</th></tr></thead>
        <tbody>${boardRows}</tbody>
      </table>
    </div>
  </div>`:''}`;
}

window.adminPrintResults=function(){
  const s=getState();const pairs=getPairs();const boards=getBoards();const movements=getMovements();
  const isIMP=s.scoring==='IMP';
  const scoreData=isIMP?calcIMP():calcMP();
  const allPairs=Object.values(pairs).filter(p=>!p.isPhantom).map(p=>{
    const d=scoreData[p.id]||{mp:0,boards:0,top:0,imp:0};
    const pct=!isIMP&&d.top>0?(d.mp/d.top*100).toFixed(1):0;
    return{...p,...d,pct:parseFloat(pct)};
  }).sort((a,b)=>isIMP?(b.imp-a.imp):(b.pct-a.pct));

  let rankRows='';
  allPairs.forEach((p,i)=>{
    const bg=i===0?'#fff8e1':i%2===0?'#fafafa':'#fff';
    const score=isIMP?(p.imp>=0?'+':'')+p.imp+' IMPs':`${p.mp} MP · ${p.pct}%`;
    rankRows+=`<tr style="background:${bg}"><td>${i+1}</td><td>${p.name}</td><td>${p.dir||'—'}</td><td>${score}</td><td>${p.boards||0}</td></tr>`;
  });

  const doneKeys=Object.keys(boards).filter(k=>boards[k].status==='done').sort();
  let bRows='';
  doneKeys.forEach(k=>{
    const bd=boards[k];const[t,r,b]=k.split('_');
    const m=movements[r+'_'+t]||{};
    const ns=pairs[m.ns]||{name:'?'};const ew=pairs[m.ew]||{name:'?'};
    const sc=typeof bd.nsScore==='number'?(bd.nsScore>0?'+':'')+bd.nsScore:'?';
    const bg=typeof bd.nsScore==='number'?(bd.nsScore>0?'#e8f5e9':bd.nsScore<0?'#ffebee':'#fff8e1'):'#f5f5f5';
    bRows+=`<tr style="background:${bg}"><td>T${t}/R${r}/B${b}</td><td>${ns.name}</td><td>${ew.name}</td><td>${bd.contract||'PASS'}${bd.adjusted?' [ADJ]':''}</td><td>${bd.lead||'—'}</td><td>${sc}</td></tr>`;
  });

  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${s.name}</title>
  <style>body{font-family:Arial,sans-serif;font-size:11px;margin:16px;color:#222;}h1{font-size:17px;color:#1a237e;margin-bottom:3px;}h2{font-size:12px;color:#1a237e;border-bottom:1px solid #1a237e;padding-bottom:2px;margin:14px 0 5px;}.meta{font-size:10px;color:#666;margin-bottom:12px;}table{width:100%;border-collapse:collapse;margin-bottom:10px;}th{background:#1a237e;color:#fff;padding:4px 7px;text-align:left;font-size:9px;text-transform:uppercase;}td{padding:4px 7px;border-bottom:1px solid #e0e0e0;}</style>
  </head><body>
  <h1>♠ ${s.name||'Tournament'}</h1>
  <div class="meta">${s.tableCount} tables · ${s.roundCount} rounds · ${s.scoring} · Printed: ${new Date().toLocaleString('en-GB')}</div>
  <h2>Rankings</h2>
  <table><thead><tr><th>#</th><th>Name</th><th>Dir</th><th>Score</th><th>Boards</th></tr></thead><tbody>${rankRows}</tbody></table>
  <h2>Board Results (${doneKeys.length})</h2>
  <table><thead><tr><th>T/R/B</th><th>NS</th><th>EW</th><th>Contract</th><th>Lead</th><th>NS Score</th></tr></thead><tbody>${bRows}</tbody></table>
  <script>window.onload=function(){window.print();}<\/script>
  </body></html>`);
  win.document.close();
};

window.viewArchive=function(i){
  const a=getArchives()[i];if(!a) return;
  const isIMP=a.state?.scoring==='IMP';
  const scoreData=isIMP?calcIMP(a.boards,a.movements):calcMP(a.boards,a.movements);
  const pairs=a.pairs||{};
  const allPairs=Object.values(pairs).filter(p=>!p.isPhantom).map(p=>{
    const d=scoreData[p.id]||{mp:0,boards:0,top:0,imp:0};
    const pct=!isIMP&&d.top>0?(d.mp/d.top*100).toFixed(1):0;
    return{...p,...d,pct:parseFloat(pct)};
  }).sort((a,b)=>isIMP?(b.imp-a.imp):(b.pct-a.pct));

  const rows=allPairs.map((p,idx)=>{
    const score=isIMP?(p.imp>=0?'+':'')+p.imp+' IMPs':`${p.mp} MP (${p.pct}%)`;
    return`<tr><td>${idx+1}</td><td>${p.name}</td><td>${p.dir||'—'}</td><td>${score}</td></tr>`;
  }).join('');

  openModal(a.state?.name+' — Results',`

    `<button class="btn btn-ghost" onclick="closeModal()">Close</button>`);
};

};

window.bmSelectTable=async function(n){
  const s=getState();
  // Check lock
  const lockKey='lock_'+s.currentRound+'_'+n+'_'+bmSide;
  const appr=getApprovals();
  if(appr[lockKey]&&appr[lockKey]!==_fbTourneyId+'_'+n+'_'+bmSide){
    toast('❌ Table '+n+' '+bmSide.toUpperCase()+' already taken');
    return;
  }

  // If Firebase cache empty, load first
  if(_fbOnline&&_fbDb&&_fbTourneyId&&
    (!_fbCache['pairs']||!_fbCache['movements']||Object.keys(_fbCache['pairs']||{}).length===0)){
    document.getElementById('panelContent').innerHTML=`
      <div class="bm-device"><div class="waiting-screen">
        <div class="waiting-icon">⚡</div>
        <div class="waiting-title">Connecting...</div>
        <div class="waiting-sub">Loading tournament data</div>
      </div></div>`;
    try{ await fbLoadAll(); }catch(e){}
    ['state','pairs','boards','movements','approvals','messages'].forEach(k=>fbSubscribe(k));
  }

  const pairs=getPairs();
  const movements=getMovements();
  const mk=s.currentRound+'_'+n;
  const m=movements[mk]||{};
  const pairKey=bmSide==='ns'?m.ns:m.ew;
  const pair=pairs[pairKey]||{};
  const nm=(pair.name||'').trim();
  const isDefault=!nm||/^(NS|EW)\s*\d+$/.test(nm)||/^Pair\s*\d+$/.test(nm);

  bmTableNo=n;
  saveTableSession(n,bmSide);

  if(!isDefault){
    bmShowNameConfirm(n,pairKey,pair.name,m);
  } else {
    bmShowNameEntry(n,pairKey,'',m);
  }
};

function renderTableDetail(tableNo){
  // Ensure data loaded
  const pairs=getPairs();
  const movements=getMovements();
  const hasData=Object.keys(pairs).length>0&&Object.keys(movements).length>0;

  if(!hasData&&_fbOnline&&_fbDb&&_fbTourneyId){
    document.getElementById('panelContent').innerHTML=`
      <div class="bm-device"><div class="waiting-screen">
        <div class="waiting-icon">⚡</div><div class="waiting-title">Loading...</div>
      </div></div>`;
    fbLoadAll().then(()=>renderTableDetail(tableNo)).catch(()=>_renderTableDetail(tableNo));
    return;
  }
  _renderTableDetail(tableNo);
}

function _renderTableDetail(tableNo){
  const s=getState();
  const movements=getMovements();
  const boards=getBoards();
  const pairs=getPairs();
  const mk=s.currentRound+'_'+tableNo;
  const m=movements[mk]||{};

  const nsNum=(m.ns||'').replace(/[^0-9]/g,'');
  const ewNum=(m.ew||'').replace(/[^0-9]/g,'');
  const nsPair=pairs[m.ns]||{name:'NS '+nsNum};
  const ewPair=pairs[m.ew]||{name:'EW '+ewNum};
  const nsName=nsPair.name||'NS '+nsNum;
  const ewName=ewPair.name||'EW '+ewNum;
  const isPhantom=nsPair.isPhantom||ewPair.isPhantom;

  // Board list
  const boardList=[];
  for(let b=m.boardStart||1;b<=(m.boardEnd||3);b++){
    const key=tableNo+'_'+s.currentRound+'_'+b;
    const bd=boards[key];
    const vuln=getVuln(b);
    boardList.push({b,key,bd,vuln});
  }

  const allDone=boardList.every(x=>x.bd?.status==='done');
  const pendingApproval=boardList.some(x=>x.bd?.status==='pending');
  const approvals=getApprovals();
  const myApprovalKey='approval_'+tableNo+'_'+s.currentRound+'_'+bmSide;
  const needsMyApproval=approvals[myApprovalKey+'_needed'];

  // LCD content
  const lcdLine1=`TABLE ${String(tableNo).padStart(2,' ')}  RND ${String(s.currentRound).padStart(2,' ')}  ${s.scoring.padStart(3,' ')} `;

  let boardsHtml=boardList.map(({b,key,bd,vuln})=>{
    const isDone=bd?.status==='done';
    const isPending=bd?.status==='pending';
    const contract=isDone||isPending?bd.contract:null;
    const score=isDone&&typeof bd.nsScore==='number'?(bd.nsScore>0?'+':'')+bd.nsScore:'';
    const scoreColor=bd?.nsScore>0?'var(--green)':bd?.nsScore<0?'var(--red)':'var(--text2)';
    return`<div class="board-item ${isDone?'done':isPending?'pending':'active'}" 
         onclick="${!isDone&&!isPending?`bmOpenBoard(${tableNo},${b})`:''}">
      <div class="bi-num">Board ${b} <span class="vul-badge vul-${vuln.toLowerCase().replace(' ','')}">${vuln}</span></div>
      <div class="bi-contract">${contract||''}</div>
      ${isDone?`<div class="bi-score" style="color:${scoreColor};">${score}</div>`:''}
      ${isPending?`<div style="color:var(--gold);font-size:0.72rem;">⏳ Approval</div>`:''}
      ${!isDone&&!isPending?`<div style="color:var(--text3);font-size:0.72rem;">→ Enter</div>`:''}
      ${bd?.adjusted?`<span class="adj-badge">ADJ</span>`:''}
    </div>`;
  }).join('');

  let statusHtml='';
  if(allDone){
    if(s.currentRound<s.roundCount){
      const nextM=movements[(s.currentRound+1)+'_'+tableNo]||{};
      const nextNS=pairs[nextM.ns]||{name:'?'};
      const nextEW=pairs[nextM.ew]||{name:'?'};
      statusHtml=`
      <div class="round-over-screen">
        <div class="ro-badge">🎉</div>
        <div class="ro-title">Round ${s.currentRound} Complete!</div>
        <div class="ro-sub">All ${boardList.length} boards entered</div>
        <div class="next-round-card">
          <div class="nr-title">Next Round ${s.currentRound+1}</div>
          <div class="ro-move-card">
            <div class="ro-move-label">NS stays · EW moves</div>
            <div class="ro-move-main">NS: ${nextNS.name}</div>
            <div class="ro-move-sub">EW: ${nextEW.name}</div>
            <div class="ro-move-sub">Boards ${nextM.boardStart||'?'}–${nextM.boardEnd||'?'}</div>
          </div>
        </div>
        <button class="btn btn-ghost btn-full" onclick="bmViewScoreboard()">📊 View Scoreboard</button>
      </div>`;
    } else {
      statusHtml=`
      <div class="round-over-screen">
        <div class="ro-badge">🏁</div>
        <div class="ro-title">Tournament Complete!</div>
        <div class="ro-sub">All rounds finished</div>
        <button class="btn btn-gold btn-full" onclick="bmViewScoreboard()">🏆 View Results</button>
      </div>`;
    }
  }

  document.getElementById('panelContent').innerHTML=`
  <div class="bm-device">
    <div class="bm-lcd">
      <div class="bm-lcd-row inv">${lcdLine1}</div>
      <div class="bm-lcd-row">NS${nsNum.padStart(2,' ')}: ${nsName.slice(0,14).padEnd(14)}</div>
      <div class="bm-lcd-row">EW${ewNum.padStart(2,' ')}: ${ewName.slice(0,14).padEnd(14)}</div>
      <div class="bm-lcd-row">BOARDS ${m.boardStart||'?'} TO ${m.boardEnd||'?'} ${allDone?'DONE   ':'       '}</div>
    </div>
    ${isPhantom?`<div class="director-bar">👻 Phantom pair — no entry needed, award Average</div>`:''}
    <div id="broadcastBar"></div>
    <div id="boardsList">${boardsHtml}</div>
    ${statusHtml}
    <div style="display:flex;gap:6px;margin-top:10px;">
      <button class="btn btn-ghost btn-sm" onclick="bmTableNo=null;bmEntry={};renderTablePanel()">← Tables</button>
      <button class="btn btn-ghost btn-sm" onclick="bmViewScoreboard()">📊 Board Comparison</button>
    </div>
  </div>`;
  checkBroadcast();
}

// Entry setters
window.bmSetLevel=function(t,b,l){bmEntry.level=l;if(bmEntry.result===null)bmEntry.result=0;_renderBoardForm(t,b);};
window.bmSetSuit2=function(t,b,s){bmEntry.suit=s;_renderBoardForm(t,b);};
window.bmSetDoubled=function(t,b,d){bmEntry.doubled=d;_renderBoardForm(t,b);};
window.bmSetDeclarer=function(t,b,d){bmEntry.declarer=d;_renderBoardForm(t,b);};
window.bmChangeResult=function(t,b,delta){
  if(bmEntry.level===null||bmEntry.level==='PASS') return;
  const cur=bmEntry.result===null?0:bmEntry.result;
  const minResult=-(bmEntry.level||1);
  const maxResult=7-(bmEntry.level||1);
  bmEntry.result=Math.max(minResult,Math.min(maxResult,cur+delta));
  // Update inline without full re-render
  const d=document.getElementById('resultDisp');
  const l=document.getElementById('resultLabel');
  if(d) d.textContent=bmEntry.result===0?'=':bmEntry.result>0?'+'+bmEntry.result:bmEntry.result;
  if(l) l.textContent=bmEntry.result>=0?'Made':'Down '+Math.abs(bmEntry.result);
  updateLCDResult(t,b);
  // Update preview
  _refreshScorePreview(t,b);
};
window.bmSetLead=function(t,b,suit,rank){
  if(suit!==null) bmEntry.leadSuit=bmEntry.leadSuit===suit?null:suit;
  if(rank!==null) bmEntry.leadRank=rank||null;
  // Just update LCD
  updateLCDResult(t,b);
};

function updateLCDResult(t,b){
  const lead=(bmEntry.leadSuit||'')+' '+(bmEntry.leadRank||'');
  const res=bmEntry.result===null?'-':(bmEntry.result===0?'=':(bmEntry.result>0?'+':'')+bmEntry.result);
  const el=document.getElementById('lcdResult');
  if(el) el.textContent=('LEAD:'+lead.trim().slice(0,5).padEnd(5)+' RES:'+res.padEnd(3)).slice(0,20);
}

function _refreshScorePreview(t,b){
  // Just update preview div without full re-render
  const s=getState();
  const movements=getMovements();
  const mk=s.currentRound+'_'+t;
  const m=movements[mk]||{};
  const vuln=getVuln(b);
  if(bmEntry.level&&bmEntry.suit&&bmEntry.declarer&&bmEntry.result!==null){
    try{
      const sc=calcScore(bmEntry.level,bmEntry.suit,bmEntry.declarer,bmEntry.result,vuln,bmEntry.doubled||'');
      const isNS=bmEntry.declarer==='N'||bmEntry.declarer==='S';
      const nsScore=isNS?sc:-sc;
      const dispScore=nsScore>0?'+'+nsScore:String(nsScore);
      const sp=document.querySelector('.score-preview');
      if(sp) sp.querySelector('.sp-val').className='sp-val '+(nsScore>0?'pos':nsScore<0?'neg':'');
      if(sp) sp.querySelector('.sp-val').textContent=dispScore;
    }catch(e){}
  }
}

window.bmSubmitBoard=function(tableNo,boardNo){
  const s=getState();
  const movements=getMovements();
  const mk=s.currentRound+'_'+tableNo;
  const m=movements[mk]||{};
  const vuln=getVuln(boardNo);
  const key=tableNo+'_'+s.currentRound+'_'+boardNo;

  let contract,nsScore,ewScore;
  if(bmEntry.level==='PASS'){
    contract='PASS';nsScore=0;ewScore=0;
  } else {
    if(!bmEntry.level){toast('⚠️ Select level (1-7)');return;}
    if(!bmEntry.suit){toast('⚠️ Select suit (♣♦♥♠ NT)');return;}
    if(!bmEntry.declarer){toast('⚠️ Select declarer (N/S/E/W)');return;}
    if(bmEntry.result===null){bmEntry.result=0;}// default: made exactly
    contract=bmEntry.level+bmEntry.suit+' '+bmEntry.declarer+(bmEntry.doubled?bmEntry.doubled:'')+(bmEntry.result===0?' =':(bmEntry.result>0?' +':' ')+bmEntry.result);
    const rawScore=calcScore(bmEntry.level,bmEntry.suit,bmEntry.declarer,bmEntry.result,vuln,bmEntry.doubled||'');
    const isNS=bmEntry.declarer==='N'||bmEntry.declarer==='S';
    nsScore=isNS?rawScore:-rawScore;
    ewScore=-nsScore;
  }

  const lead=bmEntry.leadSuit&&bmEntry.leadRank?(bmEntry.leadSuit+bmEntry.leadRank):'—';

  // Set pending — need other side to approve
  const boards=getBoards();
  boards[key]={
    contract,lead,nsScore,ewScore,
    status:'pending',
    enteredBy:bmSide,
    time:new Date().toISOString()
  };
  setBoards(boards);

  // Request approval from other side
  const appr=getApprovals();
  const otherSide=bmSide==='ns'?'ew':'ns';
  appr['approval_'+tableNo+'_'+s.currentRound+'_'+otherSide+'_needed']=key;
  setApprovals(appr);

  addLog('ok','Board submitted',contract+' NS:'+nsScore);
  playSound('ok');
  bmEntry={level:null,suit:null,declarer:null,result:null,leadSuit:null,leadRank:null,doubled:''};

  // Show waiting for approval screen
  bmShowApprovalWait(tableNo,boardNo,contract,nsScore);
};

function bmShowApprovalWait(tableNo,boardNo,contract,nsScore){
  const scoreDisp=nsScore>0?'+'+nsScore:String(nsScore);
  document.getElementById('panelContent').innerHTML=`
  <div class="bm-device">
    <div class="bm-lcd">
      <div class="bm-lcd-row inv">BOARD ${String(boardNo).padStart(2,' ')} SUBMITTED        </div>
      <div class="bm-lcd-row">${contract.padEnd(20)}</div>
      <div class="bm-lcd-row">NS SCORE: ${scoreDisp.padEnd(11)}</div>
      <div class="bm-lcd-row blink">WAITING FOR APPROVAL  </div>
    </div>
    <div class="approval-screen">
      <div class="approval-title">Waiting for ${bmSide==='ns'?'EW':'NS'} to confirm</div>
      <div class="approval-contract">${contract}</div>
      <div class="approval-score" style="color:${nsScore>0?'var(--green)':nsScore<0?'var(--red)':'var(--text)'};">${scoreDisp}</div>
      <div class="approval-waiting">⏳ Waiting for opponent approval...</div>
      <button class="btn btn-ghost btn-full" onclick="renderTableDetail(${tableNo})">Back to Board List</button>
    </div>
  </div>`;

  // Poll for approval
  let polls=0;
  if(bmPollInterval) clearInterval(bmPollInterval);
  bmPollInterval=setInterval(()=>{
    const s=getState();
    const key=tableNo+'_'+s.currentRound+'_'+boardNo;
    const boards=getBoards();
    const bd=boards[key];
    if(bd?.status==='done'){
      clearInterval(bmPollInterval);bmPollInterval=null;
      playSound('ok');

      renderTableDetail(tableNo);

    polls++;

  },2000);
}

window.bmApproveBoard=function(boardKey,tableNo){
  const boards=getBoards();

    boards[boardKey].approvedBy=bmSide;
    boards[boardKey].approvedAt=new Date().toISOString();

  addLog('ok','Board approved',boardKey);

window.bmRejectBoard=function(boardKey,tableNo){

  const bd=boards[boardKey];

  setBoards(boards);

// ── OTHER TABLE RESULTS (comparison) ──
function getOtherTableResults(boardNo,myTable,round){
  const boards=getBoards();
  const results=[];
  const s=getState();
  for(let t=1;t<=s.tableCount;t++){
    if(t===myTable) continue;
    const key=t+'_'+round+'_'+boardNo;
    const bd=boards[key];
    if(bd?.status==='done'&&typeof bd.nsScore==='number'){
      results.push({table:t,contract:bd.contract,lead:bd.lead,nsScore:bd.nsScore});
    }
  }
  return results;
}

window.bmViewScoreboard=function(){
  const s=getState();
  const boards=getBoards();
  const movements=getMovements();
  const pairs=getPairs();
  const m=movements[s.currentRound+'_'+bmTableNo]||{};

  // Show traveller for each board played
  let html='<div class="bm-device">';
  html+=`<div class="bm-lcd"><div class="bm-lcd-row inv">BOARD COMPARISON      </div><div class="bm-lcd-row">ALL TABLES THIS ROUND </div></div>`;

  for(let b=m.boardStart||1;b<=(m.boardEnd||3);b++){
    const results=[];
    for(let t=1;t<=s.tableCount;t++){
      const key=t+'_'+s.currentRound+'_'+b;
      const bd=boards[key];
      if(!bd) continue;
      const mm=movements[s.currentRound+'_'+t]||{};
      const ns=pairs[mm.ns]||{name:'?'};const ew=pairs[mm.ew]||{name:'?'};
      results.push({table:t,ns:ns.name,ew:ew.name,contract:bd.contract||'—',lead:bd.lead||'—',nsScore:bd.nsScore,status:bd.status});
    }
    if(!results.length) continue;

    // Calculate MP for this board
    const done=results.filter(r=>r.status==='done'&&typeof r.nsScore==='number');
    const top=(done.length-1)*2;
    done.forEach(r=>{
      let mp=0;
      done.forEach(r2=>{if(r===r2) return;if(r.nsScore>r2.nsScore) mp+=2;else if(r.nsScore===r2.nsScore) mp+=1;});
      r.mp=mp;r.top=top;r.pct=top>0?((mp/top)*100).toFixed(0):50;
    });
    results.sort((a,b2)=>(typeof b2.nsScore==='number'?b2.nsScore:0)-(typeof a.nsScore==='number'?a.nsScore:0));

    html+=`<div class="card" style="margin-bottom:8px;">
      <div class="card-title"><span>🎯</span> Board ${b} <span class="vul-badge vul-${getVuln(b).toLowerCase()}">${getVuln(b)}</span></div>
      <table class="traveller-table">
        <thead><tr><th>NS</th><th>EW</th><th>Contract</th><th>Lead</th><th>Score</th><th>MP</th></tr></thead>
        <tbody>
          ${results.map(r=>`<tr class="${r.table===bmTableNo?'highlight':''}">
            <td style="font-size:0.72rem;">${r.ns}</td>
            <td style="font-size:0.72rem;">${r.ew}</td>
            <td style="font-family:'Share Tech Mono',monospace;font-size:0.75rem;">${r.contract}</td>
            <td style="font-family:'Share Tech Mono',monospace;font-size:0.75rem;">${r.lead}</td>
            <td style="font-weight:700;color:${r.nsScore>0?'var(--green)':r.nsScore<0?'var(--red)':'var(--text)'};">${typeof r.nsScore==='number'?(r.nsScore>0?'+':'')+r.nsScore:'⏳'}</td>
            <td>${typeof r.mp==='number'?`<span class="mp-pill ${r.mp===r.top?'mp-high':r.mp===0?'mp-low':'mp-mid'}">${r.mp}/${r.top}</span>`:'—'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
  }

  html+=`<button class="btn btn-ghost btn-full" onclick="renderTableDetail(${bmTableNo})">← Back</button></div>`;
  document.getElementById('panelContent').innerHTML=html;
};

    const ns=pairs[m.ns]||{name:'?'};const ew=pairs[m.ew]||{name:'?'};
    const bkeys=[];
    for(let b=m.boardStart||1;b<=(m.boardEnd||3);b++) bkeys.push(t+'_'+s.currentRound+'_'+b);
    const done=bkeys.filter(k=>boards[k]?.status==='done').length;
    const total=bkeys.length;
    const pct=total>0?Math.round(done/total*100):0;
    return`<div class="table-card" style="border-color:${done===total&&total>0?'var(--green)':done>0?'var(--gold)':'var(--border)'};">
      <div class="tc-header">
        <div class="tc-num">T${t}</div>
        <span class="tc-status ${done===total&&total>0?'tc-done':done>0?'tc-playing':'tc-waiting'}">${done}/${total}</span>
      </div>
      <div style="font-size:0.72rem;color:var(--blue);">${ns.name}</div>
      <div style="font-size:0.72rem;color:var(--gold);">${ew.name}</div>
      <div class="pct-bar-bg" style="margin-top:6px;"><div class="pct-bar" style="width:${pct}%;background:${done===total?'var(--green)':'var(--gold)'};"></div></div>
    </div>`;
  }).join('');

  c.innerHTML=`
  <div class="scoreboard">
    ${broadcastHtml}
    <div class="sb-header">
      <div class="sb-title">♠ ${s.name||'Tournament'}</div>
      <div style="display:flex;gap:6px;align-items:center;">
        <span class="live-pill"><span class="live-dot"></span>LIVE</span>
        <button class="tbtn" onclick="role==='screen'?renderScreenPanel():null" title="Refresh">↻</button>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-box"><div class="sv">${s.currentRound}/${s.roundCount}</div><div class="sl">Round</div></div>
      <div class="stat-box"><div class="sv">${doneBoards}</div><div class="sl">Boards Done</div></div>
      <div class="stat-box"><div class="sv">${progress}%</div><div class="sl">Complete</div></div>
      <div class="stat-box"><div class="sv">${s.scoring}</div><div class="sl">Scoring</div></div>
    </div>

    ${timerHtml}

    <div class="sb-tabs">
      <button class="sb-tab ${screenTab==='live'?'active':''}" onclick="screenTab='live';renderScreenPanel()">🏆 Rankings</button>
      <button class="sb-tab ${screenTab==='tables'?'active':''}" onclick="screenTab='tables';renderScreenPanel()">📋 Tables</button>
      <button class="sb-tab ${screenTab==='traveller'?'active':''}" onclick="screenTab='traveller';renderScreenPanel()">📊 Traveller</button>
    </div>

    ${screenTab==='live'?`
    <div class="card">
      <table class="sb-table">
        <thead><tr><th>#</th><th>Pair</th><th>${isIMP?'IMPs':'MP / %'}</th><th>Boards</th></tr></thead>
        <tbody>${rankRows||'<tr><td colspan="4" style="text-align:center;color:var(--text3);padding:20px;">No results yet</td></tr>'}</tbody>
      </table>
    </div>`:
    screenTab==='tables'?`<div class="table-grid">${tableStatusHtml}</div>`:
    `<div>${travHtml||'<div class="empty-state"><div class="empty-icon">📊</div>No boards completed yet</div>'}</div>`}
  </div>`;
}

window.screenToggleBoard=function(bn){
  screenBoardFilter=screenBoardFilter===bn?null:bn;
  renderScreenPanel();
};

// ── ROUND TIMER (screen display) ──
function startRoundTimer(minutes){
  roundTimerEnd=Date.now()+minutes*60000;
  DB.set('timers',{end:roundTimerEnd,mins:minutes});
  if(roundTimerInterval) clearInterval(roundTimerInterval);
  roundTimerInterval=setInterval(()=>{
    updateTimerDisplay();
    if(role==='screen') renderScreenPanel();
  },1000);
}
</script>
</body>
</html>
