
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BridgeMate · Tournament System</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');
:root{
  --bg:#0f0e0c;--surface:#1a1916;--surface2:#242220;--surface3:#2e2b27;
  --border:#2e2c29;--border2:#3e3c38;
  --text:#f0ece4;--text2:#9a958c;--text3:#5a5650;
  --gold:#c9a84c;--gold2:#e8c96a;--golddim:rgba(201,168,76,0.12);
  --red:#e05a4e;--reddim:rgba(224,90,78,0.12);
  --green:#4caf7d;--greendim:rgba(76,175,125,0.12);
  --blue:#5b9bd5;--bluedim:rgba(91,155,213,0.12);
  --purple:#a78bfa;--purpledim:rgba(167,139,250,0.12);
  --lcd:#8bac0f;--lcdbg:#0f380f;/* lcd vars kept for compat */
  --radius:12px;--radius-sm:8px;
  --shadow:0 8px 32px rgba(0,0,0,0.6);
}
[data-theme="light"]{
  --bg:#f0ede6;--surface:#fff;--surface2:#e8e4db;--surface3:#ddd9d0;
  --border:#d0ccc3;--border2:#c0bcb3;
  --text:#1a1714;--text2:#5a5650;--text3:#8a8580;
  --shadow:0 8px 32px rgba(0,0,0,0.1);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface3);border:1px solid var(--border2);color:var(--text);padding:10px 22px;border-radius:30px;font-size:0.85rem;z-index:9999;transition:transform 0.3s,opacity 0.3s;opacity:0;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow);}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:radial-gradient(ellipse at 50% 30%,#1e1b16,var(--bg));}
[data-theme="light"] #loginScreen{background:radial-gradient(ellipse at 50% 30%,#e0dbd2,var(--bg));}
.login-box{max-width:360px;width:100%;padding:36px 26px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);text-align:center;position:relative;}
.login-logo{font-family:'Playfair Display',serif;font-size:34px;color:var(--gold);letter-spacing:1px;}
.login-sub{color:var(--text2);font-size:0.8rem;padding-bottom:14px;margin-bottom:16px;border-bottom:1px solid var(--border);}
.role-tabs{display:flex;gap:5px;margin-bottom:16px;}
.role-tab{flex:1;padding:8px 0;background:var(--surface2);border:1px solid transparent;color:var(--text2);cursor:pointer;border-radius:30px;font-weight:500;font-size:0.76rem;transition:all 0.15s;font-family:inherit;}
.role-tab.active{background:var(--gold);color:#0f0e0c;font-weight:700;border-color:var(--gold);}
.pw-wrap{margin-bottom:8px;}
.pw-wrap input{width:100%;padding:11px 16px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:0.95rem;outline:none;text-align:center;letter-spacing:3px;font-family:inherit;}
.pw-wrap input:focus{border-color:var(--gold);}
.login-err{color:var(--red);font-size:0.76rem;min-height:16px;margin-bottom:6px;}
.btn-primary{width:100%;padding:12px;background:var(--gold);border:none;border-radius:30px;cursor:pointer;font-weight:700;font-size:0.92rem;color:#0f0e0c;box-shadow:0 4px 0 #7a6a33;font-family:inherit;}
.btn-primary:active{transform:translateY(3px);box-shadow:0 1px 0 #7a6a33;}
.theme-toggle-login{position:absolute;top:12px;right:12px;background:none;border:1px solid var(--border);border-radius:20px;padding:4px 10px;cursor:pointer;font-size:0.75rem;color:var(--text2);font-family:inherit;}

/* APP SHELL */
#app{display:none;flex:1;flex-direction:column;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;gap:8px;}
.topbar-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.topbar-logo{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold);}
.topbar-badge{font-size:0.66rem;padding:2px 8px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);color:var(--text3);}
.topbar-round{font-size:0.72rem;color:var(--gold);background:var(--golddim);padding:2px 9px;border-radius:10px;border:1px solid rgba(201,168,76,0.2);}
.topbar-right{display:flex;gap:5px;align-items:center;}
.tbtn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:5px 12px;border-radius:20px;font-size:0.78rem;cursor:pointer;font-family:inherit;}
.tbtn:active{background:var(--border);}
#panelContent{padding:14px;flex:1;max-width:960px;margin:0 auto;width:100%;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.panel-anim{animation:fadeUp 0.22s ease;}

/* CARDS / BUTTONS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 14px;margin-bottom:12px;}
.card-title{font-size:0.72rem;font-weight:600;color:var(--text3);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:8px 16px;border-radius:30px;border:none;cursor:pointer;font-weight:600;font-size:0.82rem;transition:all 0.15s;font-family:inherit;}
.btn:active{opacity:0.75;transform:scale(0.97);}
.btn-gold{background:var(--gold);color:#0f0e0c;}
.btn-green{background:var(--green);color:#fff;}
.btn-red{background:var(--red);color:#fff;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-purple{background:var(--purple);color:#fff;}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.btn-sm{padding:4px 10px;font-size:0.72rem;}
.btn-full{width:100%;}
.field{margin-bottom:10px;}
.field label{display:block;font-size:0.72rem;color:var(--text2);margin-bottom:3px;font-weight:500;}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:0.9rem;outline:none;font-family:inherit;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold);}
.field select option{background:var(--surface);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:200;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(3px);}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:20px 16px;max-width:440px;width:100%;box-shadow:var(--shadow);max-height:90vh;overflow-y:auto;}
.modal h3{color:var(--gold);margin-bottom:14px;font-size:0.95rem;}
.modal-actions{display:flex;gap:7px;margin-top:14px;}
.modal-actions .btn{flex:1;}

/* INFO BAR (replaces LCD) */
.bm-device{max-width:360px;margin:0 auto;padding:10px 0;}
.bm-lcd{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:14px;}
.bm-lcd-row{font-size:0.82rem;color:var(--text2);letter-spacing:0.2px;line-height:1.7;white-space:pre;font-family:'DM Sans',sans-serif;}
.bm-lcd-row.inv{background:var(--gold);color:#0f0e0c;border-radius:4px;padding:1px 6px;font-weight:700;font-size:0.78rem;}
.bm-lcd-row.blink{animation:blink 1.2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}

.bm-suit-row{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:10px;}
.bm-suit-btn{padding:10px 4px;background:var(--surface2);border:2px solid var(--border);border-radius:6px;cursor:pointer;text-align:center;font-size:1rem;font-weight:700;transition:all 0.12s;font-family:inherit;color:var(--text);}
.bm-suit-btn.red{color:var(--red);}
.bm-suit-btn.active{border-color:var(--gold);background:var(--golddim);}
.bm-suit-btn.red.active{border-color:var(--red);background:var(--reddim);}
.bm-suit-btn.nt.active{border-color:var(--blue);background:var(--bluedim);}

.bm-keypad{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:10px;}
.bm-key{padding:9px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;cursor:pointer;text-align:center;font-size:0.82rem;font-weight:600;color:var(--text2);transition:all 0.12s;font-family:inherit;line-height:1.2;}
.bm-key:active{background:var(--border);}
.bm-key.active{background:var(--gold);color:#0f0e0c;border-color:var(--gold);}
.bm-key.red-key{color:var(--red);}
.bm-key.red-key.active{background:var(--red);color:#fff;border-color:var(--red);}
.bm-key.blue-key{color:var(--blue);}
.bm-key.blue-key.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.bm-key.green-key{color:var(--green);}
.bm-key.green-key.active{background:var(--green);color:#fff;border-color:var(--green);}
.bm-key.wide{grid-column:span 2;}
.bm-key.wider{grid-column:span 3;}
.bm-key-sub{font-size:0.55rem;color:var(--text3);margin-top:1px;display:block;}

.lead-row{display:flex;gap:6px;margin-bottom:10px;align-items:center;}
.lead-row label{font-size:0.72rem;color:var(--text2);white-space:nowrap;}
.lead-suit-btns{display:flex;gap:4px;}
.lead-suit-btn{width:32px;height:32px;border:1px solid var(--border);background:var(--surface2);border-radius:5px;cursor:pointer;font-size:1rem;text-align:center;line-height:30px;font-family:inherit;}
.lead-suit-btn.active{border-color:var(--gold);background:var(--golddim);}
.lead-suit-btn.red.active{border-color:var(--red);background:var(--reddim);}
.lead-rank-select{flex:1;padding:6px 8px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:0.82rem;outline:none;font-family:inherit;}
.lead-rank-select:focus{border-color:var(--gold);}

.result-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.result-btn{width:34px;height:34px;border:1px solid var(--border);background:var(--surface2);border-radius:5px;cursor:pointer;font-size:1rem;color:var(--text2);font-family:inherit;}
.result-btn:active{background:var(--border);}
.result-disp{font-size:1.3rem;font-weight:700;color:var(--gold);min-width:48px;text-align:center;font-family:'Share Tech Mono',monospace;}
.result-label{font-size:0.76rem;color:var(--text2);flex:1;}

.score-preview{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;text-align:center;margin-bottom:10px;}
.sp-label{font-size:0.65rem;color:var(--text3);opacity:0.9;margin-bottom:2px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}
.sp-val{font-size:1.5rem;font-weight:700;color:var(--text);}
.sp-val.pos{color:var(--green);}
.sp-val.neg{color:var(--red);}

.pair-confirm{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.pair-box{border-radius:var(--radius-sm);padding:12px;text-align:center;}
.pair-box-ns{background:var(--bluedim);border:1px solid rgba(91,155,213,0.25);}
.pair-box-ew{background:var(--golddim);border:1px solid rgba(201,168,76,0.25);}
.pb-label{font-size:0.62rem;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
.pair-box-ns .pb-label{color:var(--blue);}
.pair-box-ew .pb-label{color:var(--gold);}
.pb-num{font-size:1.6rem;font-weight:900;font-family:'Playfair Display',serif;line-height:1;}
.pb-name{font-size:0.82rem;font-weight:600;margin-top:2px;}
.pb-dir{font-size:0.7rem;color:var(--text3);}

.board-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--surface2);border-radius:6px;margin-bottom:5px;border:1px solid transparent;gap:6px;}
.board-item.done{border-color:rgba(76,175,125,0.25);background:var(--greendim);}
.board-item.pending{border-color:rgba(201,168,76,0.4);background:var(--golddim);}
.bi-num{font-size:0.8rem;font-weight:700;color:var(--text3);min-width:52px;}
.bi-contract{font-size:0.82rem;flex:1;font-family:'Share Tech Mono',monospace;}
.bi-score{font-weight:700;font-size:0.85rem;min-width:46px;text-align:right;font-family:'Share Tech Mono',monospace;}

.next-round-card{background:linear-gradient(135deg,rgba(201,168,76,0.08),rgba(91,155,213,0.06));border:1px solid rgba(201,168,76,0.25);border-radius:var(--radius);padding:16px;margin-top:12px;text-align:center;}
.nr-title{font-size:0.68rem;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.nr-main{font-size:1.3rem;font-weight:700;margin-bottom:4px;}
.nr-detail{font-size:0.82rem;color:var(--text2);}
.nr-boards{display:inline-flex;gap:4px;margin-top:8px;}
.nr-board-chip{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:0.72rem;color:var(--text2);font-family:'Share Tech Mono',monospace;}

.phantom-badge{background:var(--purpledim);color:var(--purple);border:1px solid rgba(167,139,250,0.25);border-radius:20px;font-size:0.68rem;padding:2px 8px;font-weight:600;}

/* OPPONENT APPROVAL SCREEN */
.approval-screen{background:var(--surface);border:2px solid var(--gold);border-radius:var(--radius);padding:20px;text-align:center;margin-bottom:12px;}
.approval-title{font-size:0.7rem;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.approval-contract{font-family:'Share Tech Mono',monospace;font-size:1.6rem;font-weight:700;color:var(--text);margin-bottom:6px;}
.approval-score{font-size:2rem;font-weight:900;font-family:'Playfair Display',serif;margin-bottom:16px;}
.approval-waiting{font-size:0.78rem;color:var(--text3);margin-bottom:16px;animation:blink 1.5s infinite;}

/* ROUND OVER / WAITING SCREENS */
.round-over-screen{background:linear-gradient(135deg,rgba(201,168,76,0.06),rgba(91,155,213,0.04));border:2px solid var(--gold);border-radius:var(--radius);padding:24px;text-align:center;}
.ro-badge{font-size:3rem;margin-bottom:8px;}
.ro-title{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--gold);margin-bottom:6px;}
.ro-sub{font-size:0.82rem;color:var(--text2);margin-bottom:20px;}
.ro-move-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:12px;}
.ro-move-label{font-size:0.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.ro-move-main{font-size:1.1rem;font-weight:700;color:var(--text);margin-bottom:3px;}
.ro-move-boards{font-size:0.82rem;color:var(--gold);font-family:'Share Tech Mono',monospace;}

.waiting-screen{text-align:center;padding:30px 20px;}
.waiting-icon{font-size:3rem;animation:pulse 2s infinite;margin-bottom:12px;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.waiting-title{font-size:1.1rem;font-weight:700;margin-bottom:6px;}
.waiting-sub{font-size:0.82rem;color:var(--text2);}

.new-players-screen{background:var(--surface);border:2px solid var(--green);border-radius:var(--radius);padding:20px;text-align:center;}
.np-title{font-size:0.7rem;color:var(--green);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;}

/* SCREEN / LEADERBOARD */
.scoreboard{max-width:740px;margin:0 auto;}
.sb-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:6px;}
.sb-title{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--gold);}
.live-pill{display:inline-flex;align-items:center;gap:4px;font-size:0.7rem;color:var(--green);background:var(--greendim);padding:3px 9px;border-radius:10px;border:1px solid rgba(76,175,125,0.2);}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 1.5s infinite;flex-shrink:0;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:14px;}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 10px;text-align:center;}
.stat-box .sv{font-size:1.3rem;font-weight:700;color:var(--gold);}
.stat-box .sl{font-size:0.64rem;color:var(--text3);}
.sb-tabs{display:flex;gap:4px;margin-bottom:10px;background:var(--surface);border-radius:30px;padding:3px;border:1px solid var(--border);overflow-x:auto;}
.sb-tab{flex:1;padding:6px 8px;border:none;background:transparent;color:var(--text2);border-radius:26px;cursor:pointer;font-size:0.73rem;font-weight:500;transition:all 0.15s;white-space:nowrap;font-family:inherit;}
.sb-tab.active{background:var(--gold);color:#0f0e0c;font-weight:700;}
.sb-table{width:100%;border-collapse:collapse;}
.sb-table thead tr{border-bottom:2px solid var(--border2);}
.sb-table th{padding:7px 9px;text-align:left;font-size:0.65rem;font-weight:700;color:var(--text3);letter-spacing:0.5px;text-transform:uppercase;}
.sb-table tbody tr{border-bottom:1px solid var(--border);transition:background 0.15s;}
.sb-table tbody tr:hover{background:var(--surface2);}
.sb-table td{padding:10px 9px;font-size:0.85rem;}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;font-weight:700;font-size:0.75rem;}
.r1{background:var(--gold);color:#0f0e0c;}.r2{background:#9aa3b2;color:#0f0e0c;}.r3{background:#c17c3e;color:#fff;}.rn{background:var(--surface2);color:var(--text2);}
.mp-pill{display:inline-block;padding:2px 10px;border-radius:20px;font-weight:700;font-size:0.8rem;}
.mp-high{background:var(--greendim);color:var(--green);}.mp-mid{background:var(--golddim);color:var(--gold);}.mp-low{background:var(--reddim);color:var(--red);}
.pct-bar-bg{background:var(--surface2);border-radius:3px;height:3px;margin-top:3px;}
.pct-bar{height:3px;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width 0.5s;}

/* ADMIN */
.admin-wrap{max-width:700px;margin:0 auto;}
.admin-tabs{display:flex;gap:4px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.admin-tabs::-webkit-scrollbar{display:none;}
.admin-tab{padding:7px 14px;border:1px solid var(--border);background:var(--surface2);border-radius:30px;color:var(--text2);cursor:pointer;font-size:0.75rem;font-weight:500;white-space:nowrap;transition:all 0.15s;font-family:inherit;}
.admin-tab.active{background:var(--gold);color:#0f0e0c;border-color:var(--gold);font-weight:700;}
.table-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px;}
.table-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 12px;}
.table-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.tcnum{font-size:0.95rem;font-weight:700;color:var(--gold);}
.st-done{background:var(--greendim);color:var(--green);}
.st-wait{background:var(--golddim);color:var(--gold);}
.st-empty{background:var(--surface);color:var(--text3);border:1px solid var(--border);}
.tc-status{font-size:0.65rem;padding:2px 7px;border-radius:10px;font-weight:600;}
.tc-pairs{margin-bottom:7px;}
.tc-pairs div{font-size:0.77rem;padding:1px 0;}
.tc-actions{display:flex;gap:3px;flex-wrap:wrap;}
.log-item{padding:9px 11px;border-bottom:1px solid var(--border);display:flex;gap:9px;align-items:flex-start;}
.log-text{flex:1;font-size:0.8rem;}
.log-text .lt{color:var(--text);}
.log-text .ls{color:var(--text3);font-size:0.7rem;}
.log-badge{font-size:0.65rem;padding:2px 7px;border-radius:10px;white-space:nowrap;}
.lb-ok{background:var(--greendim);color:var(--green);}.lb-warn{background:var(--golddim);color:var(--gold);}.lb-err{background:var(--reddim);color:var(--red);}
.round-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;}
.rc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;flex-wrap:wrap;gap:4px;}
.rc-num{font-weight:700;color:var(--gold);font-size:0.9rem;}
.rc-stat{font-size:0.72rem;color:var(--text3);}
.round-progress{background:var(--surface);border-radius:3px;height:5px;overflow:hidden;}

// ══════════════════════════════════════════════════════
//  BRIDGE SCORING
// ══════════════════════════════════════════════════════
const SUIT_VAL={'♣':20,'♦':20,'♥':30,'♠':30,'NT':30};
const SUIT_FIRST={'♣':20,'♦':20,'♥':30,'♠':30,'NT':40};

function calcScore(level,suit,declarer,result,vuln,doubled){
  const isNS=declarer==='N'||declarer==='S';
  const isVuln=(isNS&&(vuln==='NS'||vuln==='Both'))||(!isNS&&(vuln==='EW'||vuln==='Both'));
  const dbl=doubled==='XX'?4:doubled==='X'?2:1;
  if(result<0){
    const u=Math.abs(result);let pen=0;
    if(dbl===1){pen=u*(isVuln?100:50);}
    else if(dbl===2){if(!isVuln){pen=u===1?100:u===2?300:500+(u-3)*300;}else{pen=u===1?200:u===2?500:800+(u-3)*300;}}
    else{if(!isVuln){pen=u===1?200:u===2?600:1000+(u-3)*600;}else{pen=u===1?400:u===2?1000:1600+(u-3)*600;}}
    return isNS?-pen:pen;
  }
  let trick=SUIT_FIRST[suit]+(level-1)*SUIT_VAL[suit];
  if(dbl>1)trick*=dbl;
  const game=trick>=100;
  let bonus=game?(isVuln?500:300):50;
  if(level===6)bonus+=isVuln?750:500;
  if(level===7)bonus+=isVuln?1500:1000;
  if(dbl===2)bonus+=50;if(dbl===4)bonus+=100;
  let over=0;
  if(result>0){if(dbl===1)over=result*SUIT_VAL[suit];else if(dbl===2)over=result*(isVuln?200:100);else over=result*(isVuln?400:200);}
  const total=trick+over+bonus;
  return isNS?total:-total;
}

function getVuln(boardNo){
  const v=['None','NS','EW','Both','NS','EW','Both','None','Both','EW','NS','None','Both','NS','EW','None'];
  return v[(boardNo-1)%16];
}

// IMP table
const IMP_TABLE=[15,45,85,125,165,215,265,315,365,425,495,595,745,895,1095,1295,1495,1745,1995,2245,2495,2995,3495,3995];
function scoreToIMP(diff){
  const d=Math.abs(diff);let imp=0;
  for(let i=0;i<IMP_TABLE.length;i++){if(d<IMP_TABLE[i]){imp=i;break;}if(i===IMP_TABLE.length-1)imp=24;}
  return diff>=0?imp:-imp;
}

// ══════════════════════════════════════════════════════
//  MATCHPOINT CALCULATION
// ══════════════════════════════════════════════════════
function calcMP(){
  const boards=getBoards();const movements=getMovements();
  const boardScores={};
  Object.entries(boards).forEach(([key,b])=>{
    if(b.status!=='done')return;
    const[t,r,bn]=key.split('_');
    if(!boardScores[bn])boardScores[bn]=[];
    const m=movements[r+'_'+t]||{};
    if(typeof b.nsScore!=='number')return;
    boardScores[bn].push({ns:m.ns,ew:m.ew,nsScore:b.nsScore});
  });
  const pairMP={};
  Object.entries(boardScores).forEach(([,scores])=>{
    const n=scores.length;if(n<2)return;
    const top=(n-1)*2;
    scores.forEach(s=>{
      let nsMP=0,ewMP=0;
      scores.forEach(s2=>{
        if(s===s2)return;
        if(s.nsScore>s2.nsScore){nsMP+=2;}
        else if(s.nsScore===s2.nsScore){nsMP+=1;ewMP+=1;}
        else{ewMP+=2;}
      });
      if(s.ns){if(!pairMP[s.ns])pairMP[s.ns]={mp:0,boards:0,top:0};pairMP[s.ns].mp+=nsMP;pairMP[s.ns].boards++;pairMP[s.ns].top+=top;}
      if(s.ew){if(!pairMP[s.ew])pairMP[s.ew]={mp:0,boards:0,top:0};pairMP[s.ew].mp+=ewMP;pairMP[s.ew].boards++;pairMP[s.ew].top+=top;}
    });
  });
  return pairMP;
}

// ══════════════════════════════════════════════════════
//  MOVEMENT GENERATORS
// ══════════════════════════════════════════════════════
function generateMitchell(tableCount, boardsPerRound, hasPhantom, totalBoards){
  const movements={};const pairs={};
  for(let i=1;i<=tableCount;i++) pairs['ns_'+i]={id:'ns_'+i,name:'NS '+i,dir:'NS',startTable:i,isPhantom:false};
  for(let i=1;i<=tableCount;i++) pairs['ew_'+i]={id:'ew_'+i,name:'EW '+i,dir:'EW',startTable:i,isPhantom:false};
  if(hasPhantom){pairs['phantom']={id:'phantom',name:'Phantom',dir:'EW',startTable:0,isPhantom:true};}
  const rounds=tableCount;
  const totalBoardSets=Math.ceil(totalBoards/boardsPerRound);
  for(let r=1;r<=rounds;r++){
    for(let t=1;t<=tableCount;t++){
      const ewIdx=((t+r-2)%tableCount)+1;
      const boardSet=(((t-r)%tableCount+tableCount)%tableCount)%totalBoardSets;
      const boardStart=boardSet*boardsPerRound+1;
      const boardEnd=Math.min(boardStart+boardsPerRound-1,totalBoards);
      movements[r+'_'+t]={ns:'ns_'+t,ew:'ew_'+ewIdx,boardStart,boardEnd};
    }
  }
  return{movements,pairs,rounds};
}

function generateHowell(tableCount, boardsPerRound, totalBoards){
  const movements={};const pairs={};
  const pairCount=tableCount*2;
  const rounds=pairCount-1;
  for(let i=1;i<=pairCount;i++) pairs['p'+i]={id:'p'+i,name:'Pair '+i,dir:'',startTable:0,isPhantom:false};
  const totalBoardSets=Math.ceil(totalBoards/boardsPerRound);
  for(let r=1;r<=rounds;r++){
    const players=Array.from({length:pairCount},(_,i)=>i+1);
    const fixed=players[0];const rotating=players.slice(1);
    const roundRotated=[...rotating.slice(r-1),...rotating.slice(0,r-1)];
    for(let t=1;t<=tableCount;t++){
      const p1=t===1?fixed:roundRotated[t-1];
      const p2=roundRotated[pairCount-1-t+1]||roundRotated[0];
      const boardSet=((r+t-2)%totalBoardSets);
      const boardStart=boardSet*boardsPerRound+1;
      const boardEnd=Math.min(boardStart+boardsPerRound-1,totalBoards);
      const ns=t%2===1?'p'+p1:'p'+p2;
      const ew=t%2===1?'p'+p2:'p'+p1;
      movements[r+'_'+t]={ns,ew,boardStart,boardEnd};
    }
  }
  return{movements,pairs,rounds};
}

function getNextRoundInfo(tableNo,currentRound,state,movements,pairs){
  const nextR=currentRound+1;
  if(nextR>state.roundCount)return null;
  const m=movements[nextR+'_'+tableNo];
  if(!m)return null;
  const ns=pairs[m.ns]||{name:m.ns||'—',isPhantom:false};
  const ew=pairs[m.ew]||{name:m.ew||'—',isPhantom:false};
  return{round:nextR,table:tableNo,ns,ew,boardStart:m.boardStart,boardEnd:m.boardEnd};
}

// Load passwords from Firebase (falls back to defaults)
async function loadPasswords(){
  if(_cachedPass) return _cachedPass;
  try{
    const res = await fetch(FIREBASE_CONFIG.databaseURL + '/config/passwords.json', {cache:'no-store'});
    if(res.ok){
      const data = await res.json();
      if(data && data.admin && data.table){
        _cachedPass = data;
        return _cachedPass;
      }
    }
  } catch(e){ console.warn('Firebase password fetch failed, using defaults'); }
  _cachedPass = {...DEFAULT_PASS};
  return _cachedPass;
}

// Save passwords to Firebase
async function savePasswords(adminPw, tablePw){
  const body = JSON.stringify({admin: adminPw, table: tablePw});
  const res = await fetch(FIREBASE_CONFIG.databaseURL + '/config/passwords.json', {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body
  });
  if(!res.ok) throw new Error('Firebase write failed: ' + res.status);
  _cachedPass = {admin: adminPw, table: tablePw};
}

window.bmSelectTable=function(){

function renderTableDetail(tableNo){
  const s=getState();
  const movements=getMovements();const pairs=getPairs();const boards=getBoards();
  const mk=s.currentRound+'_'+tableNo;
  const m=movements[mk]||{};
  const nsPair=pairs[m.ns]||{name:'—',id:m.ns};
  const ewPair=pairs[m.ew]||{name:'—',id:m.ew};
  const isPhantom=nsPair.isPhantom||ewPair.isPhantom;

  const boardList=[];
  for(let b=m.boardStart||1;b<=(m.boardEnd||3);b++){
    const key=tableNo+'_'+s.currentRound+'_'+b;
    boardList.push({boardNo:b,key,data:boards[key]||null});
  }
  const doneCount=boardList.filter(x=>x.data&&x.data.status==='done').length;
  const totalBoards=boardList.length;
  const nsNum=m.ns?m.ns.replace(/[^0-9]/g,''):'?';
  const ewNum=m.ew?m.ew.replace(/[^0-9]/g,''):'?';
  const lcdLine1=`RND ${String(s.currentRound).padStart(2,' ')}  NS:${nsNum.padStart(2,' ')} EW:${ewNum.padStart(2,' ')} B${m.boardStart||'?'}-${m.boardEnd||'?'}`;

  const approvals=getApprovals();
  // Find the next (first un-done) board to play
  const nextBoard=boardList.find(bl=>!(bl.data&&bl.data.status==='done'));
  const approvalPending=boardList.find(bl=>{
    const apk=tableNo+'_'+s.currentRound+'_'+bl.boardNo;
    const ap=approvals[apk];
    return ap&&ap.status==='pending';
  });

  let boardsHTML='';
  if(approvalPending){
    const apk=tableNo+'_'+s.currentRound+'_'+approvalPending.boardNo;
    const ap=approvals[apk];
    boardsHTML=`<div class="board-item pending">
      <span class="bi-num">Board ${approvalPending.boardNo}</span>
      <span class="bi-contract">${ap.contract||'—'}</span>
      <span style="font-size:0.72rem;color:var(--gold);">⏳ Awaiting approval</span>
      ${bmSide!==ap.side
        ?`<button class="btn btn-green btn-sm" onclick="bmApproveScore('${apk}')">✅ OK</button>`
        :`<button class="btn btn-red btn-sm" onclick="bmCancelApproval('${apk}')">✕</button>`}
    </div>`;
  } else if(nextBoard){
    boardsHTML=`<div class="board-item pending" style="border-color:var(--gold);cursor:pointer;" onclick="bmEnterBoard(${nextBoard.boardNo})">
      <span class="bi-num" style="color:var(--gold);font-size:1rem;">Board ${nextBoard.boardNo}</span>
      <span class="bi-contract" style="color:var(--text2);font-size:0.8rem;">${totalBoards} of ${doneCount+1}. (next)</span>
      <span style="font-size:0.78rem;color:var(--text3);"></span>
      <button class="btn btn-gold btn-sm" onclick="event.stopPropagation();bmEnterBoard(${nextBoard.boardNo})">Enter ↵</button>
    </div>`;
  }
  const boardsHTMLunused='';

  const allDone=doneCount===totalBoards&&totalBoards>0;
  let actionHTML='';
  if(allDone){
    if(s.currentRound<s.roundCount){
      actionHTML=`<button class="btn btn-gold btn-full" style="margin-top:10px;" onclick="bmShowRoundOver(${tableNo})">▶ Round Complete — Continue</button>`;
    } else {
      actionHTML=`<div class="next-round-card">
        <div class="nr-title">🏁 Turnuva Bitti</div>
        <div class="nr-main" style="font-size:1rem;margin-bottom:8px;">Tüm boardlar tamamlandı</div>
        <div class="nr-detail" style="margin-bottom:14px;">Sonuçlar Screen ekranında görülebilir</div>
        <button class="btn btn-ghost btn-full" onclick="doLogout()" style="font-size:0.82rem;">← Çıkış Yap</button>
      </div>`;
    }
  }

  document.getElementById('panelContent').innerHTML=`
    <div class="bm-device" style="max-width:360px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <button class="btn btn-ghost btn-sm" onclick="renderTablePanel()">← Back</button>
        <span style="font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--gold);">Table ${tableNo}</span>
        <span style="font-size:0.72rem;color:var(--text3);">${doneCount}/${totalBoards}</span>
        <span style="font-size:0.68rem;color:${bmSide==='ns'?'var(--blue)':'var(--gold)'};">${bmSide==='ns'?'🔵 NS':'🟡 EW'}</span>
        ${isPhantom?'<span class="phantom-badge">PHANTOM</span>':''}
      </div>
      <div class="bm-lcd">
        <div class="bm-lcd-row inv">Round ${s.currentRound}  ·  Table ${tableNo}  ·  Boards ${m.boardStart||'?'}–${m.boardEnd||'?'}</div>
        <div class="bm-lcd-row">🔵 NS: ${nsPair.name.slice(0,30)}</div>
        <div class="bm-lcd-row">🟡 EW: ${ewPair.name.slice(0,30)}</div>
        <div class="bm-lcd-row" style="color:var(--gold);font-size:0.72rem;">${s.scoring==='IMP'?'IMP Scoring':'Matchpoint Scoring'}</div>
      </div>
      <div id="boardsSection">
        <div class="card">
          <div class="card-title"><span>🃏</span> ${allDone?'All Boards Complete ✓':nextBoard?'Next Board: '+nextBoard.boardNo:approvalPending?'Awaiting Approval...':'Hazir'}</div>
          <div id="boardsList">${boardsHTML}</div>
          ${isPhantom?`<div style="margin-top:8px;text-align:center;font-size:0.8rem;color:var(--purple);">👻 Phantom pair — sit out</div>`:''}
        </div>
        ${actionHTML}
      </div>
    </div>`;

  // Other tables — same boards (all rounds, all tournament types)
  function buildDetailOtherHTML(){
    const boards2=getBoards();const movements2=getMovements();const pairs2=getPairs();const approvals2=getApprovals();
    const myBoards=[];
    for(let b=m.boardStart||1;b<=(m.boardEnd||3);b++)myBoards.push(b);
    if(!myBoards.length)return '';
    let html='';
    myBoards.forEach(function(boardNo){
      // Only show other results if THIS table has already completed this board
      const myKey=tableNo+'_'+s.currentRound+'_'+boardNo;
      const myBoard=boards2[myKey];
      if(!myBoard||myBoard.status!=='done')return; // not yet played by us → hide

      const results=[];
      Object.entries(movements2).forEach(function([mk,mv]){
        const parts=mk.split('_');if(parts.length!==2)return;
        const r=parseInt(parts[0]);const t=parseInt(parts[1]);
        if(t===tableNo&&r===s.currentRound)return;
        if(boardNo>=(mv.boardStart||1)&&boardNo<=(mv.boardEnd||999)){
          const bkey=t+'_'+r+'_'+boardNo;
          const bd=boards2[bkey];
          if(bd&&bd.status==='done'&&typeof bd.nsScore==='number'){
            results.push({table:t,round:r,nsScore:bd.nsScore,contract:bd.contract||'?'});return;
          }
        }
      });
      if(!results.length)return;
      html+='<div style="margin-top:6px;margin-bottom:2px;font-size:0.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:1px;">Board '+boardNo+' — Other tables ('+results.length+')</div>';
      results.forEach(function(o){
        const sc=o.nsScore>0?'var(--green)':o.nsScore<0?'var(--red)':'var(--gold)';
        html+='<div style="display:flex;justify-content:space-between;align-items:center;background:var(--surface2);border-radius:6px;padding:5px 10px;margin-bottom:3px;font-size:0.77rem;">'
          +'<span style="color:var(--text3);white-space:nowrap;">T'+o.table+' R'+o.round+'</span>'
          +'<span style="font-family:\'Share Tech Mono\',monospace;flex:1;text-align:center;padding:0 6px;">'+(o.contract!=='?'?o.contract:'—')+'</span>'
          +'<span style="font-weight:700;color:'+sc+';white-space:nowrap;">'+(o.nsScore>0?'+':'')+o.nsScore+'</span>'
          +'</div>';
      });
    });
    if(!html)return '';
    return '<div class="card" style="margin-top:10px;"><div class="card-title"><span>📊</span> Same board — other results</div>'+html+'</div>';
  }

  document.getElementById('panelContent').querySelector('#boardsSection')?.insertAdjacentHTML('beforeend',buildDetailOtherHTML());

  // Auto-poll for approvals
  if(bmPollInterval)clearInterval(bmPollInterval);
  bmPollInterval=setInterval(()=>bmPollApprovals(tableNo),1500);
}

function bmPollApprovals(tableNo){
  const s=getState();
  const m=getMovements()[s.currentRound+'_'+tableNo]||{};
  const approvals=getApprovals();
  const boards=getBoards();
  let needRefresh=false;
  for(let b=m.boardStart||1;b<=(m.boardEnd||3);b++){
    const apk=tableNo+'_'+s.currentRound+'_'+b;
    const ap=approvals[apk];
    if(ap&&ap.status==='approved'&&!(boards[apk]?.status==='done')){
      // Approval came in — save the board
      const bs=getBoards();
      bs[apk]={...ap,status:'done',time:new Date().toISOString()};
      setBoards(bs);
      // Remove approval
      const aps=getApprovals();
      delete aps[apk];
      setApprovals(aps);
      needRefresh=true;
    }
  }
  if(needRefresh)renderTableDetail(tableNo);
}

window.bmApproveScore=function(apk){
  const aps=getApprovals();
  if(!aps[apk]||aps[apk].status!=='pending')return;
  aps[apk].status='approved';
  setApprovals(aps);
  const [tableNo,round,boardNo]=apk.split('_');
  const bs=getBoards();
  bs[apk]={...aps[apk],status:'done',time:new Date().toISOString()};
  setBoards(bs);
  delete aps[apk];setApprovals(aps);
  addLog('ok',`Board ${boardNo} approved`,`Table ${tableNo} Round ${round}`);
  toast('✅ Score confirmed!');
  renderTableDetail(parseInt(tableNo));
};

window.bmCancelApproval=function(apk){
  const aps=getApprovals();
  delete aps[apk];setApprovals(aps);
  const [tableNo]=apk.split('_');
  toast('Approval cancelled');
  renderTableDetail(parseInt(tableNo));
};

window.adjRes=function(n){boardForm.result+=n;updateResDisp();updateLCD();updateScore();};
function updateResDisp(){
  const el=document.getElementById('resDisp');if(!el)return;
  const r=boardForm.result;
  el.textContent=r>0?'+'+r:r<0?String(r):'= 0';
  el.style.color=r>0?'var(--green)':r<0?'var(--red)':'var(--gold)';
  const lb=document.getElementById('resLabel');if(!lb)return;
  if(boardForm.isPass){lb.textContent='passed out';return;}
  if(!boardForm.level){lb.textContent='';return;}
  lb.textContent=r>0?`+${r} overtrick${r>1?'s':''}`:r<0?`${Math.abs(r)} down`:'made exactly';
}
function updateScore(){
  const el=document.getElementById('spVal');if(!el)return;
  if(!boardForm.level||!boardForm.suit||!boardForm.declarer){el.textContent='—';el.className='sp-val';return;}
  const s=calcScore(boardForm.level,boardForm.suit,boardForm.declarer,boardForm.result,boardForm.vuln,boardForm.doubled);
  el.textContent=(s>0?'+':'')+s;
  el.className='sp-val'+(s>0?' pos':s<0?' neg':'');
}
function updateLCD(){
  const lc=document.getElementById('lcdContr');const ll=document.getElementById('lcdLead');const lr=document.getElementById('lcdResult');
  if(!lc)return;
  let contr='—';
  if(boardForm.isPass)contr='PASS';
  else if(boardForm.level&&boardForm.suit){contr=boardForm.level+boardForm.suit+(boardForm.doubled||'')+(boardForm.declarer?' '+boardForm.declarer:'');}
  lc.textContent='Contract: '+contr;
  const lead=boardForm.leadSuit&&boardForm.leadRank?boardForm.leadSuit+boardForm.leadRank:boardForm.leadSuit||'—';
  ll.textContent='Lead: '+lead;
  const r=boardForm.result;
  lr.textContent='Result: '+(boardForm.isPass?'PASS':r>0?'+'+r:r<0?String(r):'=');
}

// Save board and send to opponent for approval
window.saveBoardAndSendApproval=function(boardNo){
  const key=bmTableNo+'_'+getState().currentRound+'_'+boardNo;
  let boardData={};
  const s=getState();

  if(boardForm.isPass){
    boardData={contract:'PASS',nsScore:0,ewScore:0,level:null,suit:null,declarer:null,result:0,doubled:'',lead:'',vuln:boardForm.vuln,adjusted:false};
  } else {
    if(!boardForm.level||!boardForm.suit||!boardForm.declarer){toast('❌ Select level, suit and declarer');return;}
    const nsScore=calcScore(boardForm.level,boardForm.suit,boardForm.declarer,boardForm.result,boardForm.vuln,boardForm.doubled);
    const contract=boardForm.level+boardForm.suit+(boardForm.doubled||'')+' '+boardForm.declarer+(boardForm.result>=0?' +'+(boardForm.result||'='):(boardForm.result));
    const lead=boardForm.leadSuit&&boardForm.leadRank?boardForm.leadSuit+boardForm.leadRank:'';
    boardData={contract,level:boardForm.level,suit:boardForm.suit,declarer:boardForm.declarer,result:boardForm.result,doubled:boardForm.doubled,lead,vuln:boardForm.vuln,nsScore,ewScore:-nsScore,adjusted:false};
  }

  // Store pending approval
  const aps=getApprovals();
  aps[key]={...boardData,status:'pending',side:bmSide,sentTime:new Date().toISOString()};
  setApprovals(aps);
  addLog('ok',`Board ${boardNo} sent for approval`,`Table ${bmTableNo} | ${boardData.contract}`);

  // Show approval waiting screen
  renderApprovalWaiting(boardNo,boardData,key);
};

function getOtherTablesSameBoard(boardNo,myTableNo,myRound){
  const boards=getBoards();const movements=getMovements();const pairs=getPairs();
  const approvals=getApprovals();
  const results=[];
  Object.entries(movements).forEach(([mk,m])=>{
    const parts=mk.split('_');if(parts.length!==2)return;
    const r=parseInt(parts[0]);const t=parseInt(parts[1]);
    // Skip my own table+round combo
    if(t===myTableNo&&r===myRound)return;
    if(boardNo>=m.boardStart&&boardNo<=m.boardEnd){
      const bkey=t+'_'+r+'_'+boardNo;
      const ns=pairs[m.ns]||{name:m.ns||'?'};
      const ew=pairs[m.ew]||{name:m.ew||'?'};
      // Check completed boards
      const bd=boards[bkey];
      if(bd&&bd.status==='done'&&typeof bd.nsScore==='number'){
        results.push({table:t,round:r,ns:ns.name,ew:ew.name,nsScore:bd.nsScore,contract:bd.contract||'?',pending:false});
        return;
      }
      // Don't show pending approvals as completed results
    }
  });
  return results;
}

function renderApprovalWaiting(boardNo,boardData,key){
  const s=getState();
  const nsScore=boardData.nsScore;
  const scoreStr=typeof nsScore==='number'?(nsScore>0?'+':'')+nsScore:'PASS';
  const scoreColor=typeof nsScore==='number'?(nsScore>0?'var(--green)':nsScore<0?'var(--red)':'var(--gold)'):'var(--gold)';

  function buildOtherHTML(){
    // Diğer masaların sonuçlarını approval ekranında gösterme — board henüz tamamlanmadı
    return '';
  }
  const otherTablesHTML=buildOtherHTML();
  document.getElementById('panelContent').innerHTML=`
    <div class="bm-device" style="max-width:360px;">
      <div class="bm-lcd">
        <div class="bm-lcd-row inv">Board ${String(boardNo).padStart(2,' ')} — Awaiting Approval</div>
        <div class="bm-lcd-row">Contract: ${(boardData.contract||'PASS')}</div>
        <div class="bm-lcd-row">NS Score: ${String(scoreStr)}</div>
        <div class="bm-lcd-row blink" style="color:var(--gold);">Waiting for opponent to confirm...</div>
      </div>
      <div class="approval-screen">
        <div class="approval-title">⏳ Waiting for opponent to confirm</div>
        <div class="approval-contract">${boardData.contract||'PASS'}</div>
        <div class="approval-score" style="color:${scoreColor};">NS: ${scoreStr}</div>
        <div class="approval-waiting">Waiting for opponent device to confirm...</div>
        <div style="display:flex;gap:8px;margin-top:10px;">
          <button class="btn btn-ghost btn-full" onclick="bmCancelApproval('${key}');renderTableDetail(${bmTableNo});">✕ Cancel</button>
          <button class="btn btn-green btn-full" onclick="bmSelfApprove('${key}',${bmTableNo})">✅ Both Agreed</button>
        </div>
      </div>
    </div>`;

  // Poll for approval + refresh other tables info
  if(bmPollInterval)clearInterval(bmPollInterval);
  bmPollInterval=setInterval(()=>{
    const aps=getApprovals();
    const ap=aps[key];
    if(!ap||ap.status==='approved'){
      clearInterval(bmPollInterval);bmPollInterval=null;
      const bs=getBoards();
      if(!bs[key]||bs[key].status!=='done'){
        bs[key]={...boardData,status:'done',time:new Date().toISOString()};
        setBoards(bs);
        delete aps[key];setApprovals(aps);
      }
      addLog('ok','Board '+boardNo+' onaylandi',boardData.contract||'PASS');
      toast('✅ Approved! Next board.');
      renderTableDetail(bmTableNo);
    }
  },1500);
};

// Quick self-approve (both sides agree, only one device)
window.bmSelfApprove=function(key,tableNo){
  const aps=getApprovals();
  const ap=aps[key];if(!ap)return;
  const bs=getBoards();
  bs[key]={...ap,status:'done',time:new Date().toISOString()};
  setBoards(bs);
  delete aps[key];setApprovals(aps);
  if(bmPollInterval){clearInterval(bmPollInterval);bmPollInterval=null;}
  addLog('ok',`Board approved (self)`,key);
  toast('✅ Score saved!');
  renderTableDetail(tableNo);
};

  if(!data.length)return`<div class="empty-state"><div class="empty-icon">♠</div>No scores entered yet</div>`;
  return`<table class="sb-table">

      const rk=i+1;const rc=rk===1?'r1':rk===2?'r2':rk===3?'r3':'rn';
      const pc=r.pct>=60?'mp-high':r.pct>=45?'mp-mid':'mp-low';

        <td><div style="font-size:0.82rem;font-weight:600;">${r.pct}%</div><div class="pct-bar-bg"><div class="pct-bar" style="width:${r.pct}%"></div></div></td>
        <td style="color:var(--text3);font-size:0.78rem;">${r.boards}</td>

function renderTablesTab(){
  const s=getState();if(!s.tableCount)return`<div class="empty-state"><div class="empty-icon">⚙️</div>Tournament not set up</div>`;
  const movements=getMovements();const pairs=getPairs();const boards=getBoards();
  let html='<div class="table-grid">';
  for(let t=1;t<=s.tableCount;t++){
    const m=movements[s.currentRound+'_'+t]||{};
    const ns=pairs[m.ns]||{name:'—',isPhantom:false};const ew=pairs[m.ew]||{name:'—',isPhantom:false};
    let done=0,total=0;
    for(let b=m.boardStart||1;b<=(m.boardEnd||3);b++){total++;if(boards[t+'_'+s.currentRound+'_'+b]?.status==='done')done++;}
    const st=done===total&&total>0?'st-done':done>0?'st-wait':'st-empty';
    html+=`<div class="table-card">
      <div class="table-card-head"><span class="tcnum">Table ${t}</span><span class="tc-status ${st}">${done}/${total}</span></div>
      <div class="tc-pairs">
        <div style="color:var(--blue);">🔵 ${ns.name}${ns.isPhantom?' 👻':''}</div>
        <div style="color:var(--gold);">🟡 ${ew.name}${ew.isPhantom?' 👻':''}</div>
      </div>
      <div style="font-size:0.7rem;color:var(--text3);">Boards ${m.boardStart||'?'}–${m.boardEnd||'?'}</div>
    </div>`;
  }
  return html+'</div>';
}

  const m={setup:renderSetup,players:renderPlayersAdmin,movement:renderMovement,tables:renderTables,boards:renderBoards,history:renderHistory,log:renderLog,security:renderSecurity};

// ── Setup ──
function renderSetup(){
  const s=getState();
  // Calculate derived values for display
  const playerCount=parseInt(s._setupPlayers||0);
  const tableCount=playerCount>0?Math.floor(playerCount/4):0;
  const hasPhantom=playerCount>0&&playerCount%4!==0;
  return`
  <div class="card">
    <div class="card-title"><span>⚙️</span> Tournament Setup</div>
    <div class="field"><label>Tournament ID (auto)</label><input id="aName" value="${s.name||''}" readonly style="cursor:default;color:var(--text3);font-size:0.82rem;" placeholder="Assigned automatically when tournament is created"></div>
    <div class="field-row">
      <div class="field">
        <label>Number of Players</label>
        <input type="number" id="aPlayers" value="${s._setupPlayers||16}" min="4" max="120" oninput="adminUpdateCalc()">
        <div style="font-size:0.72rem;color:var(--text3);margin-top:3px;" id="calcHint">→ ${tableCount} tables${hasPhantom?' + 1 phantom':''}</div>
      </div>
      <div class="field">
        <label>Total Boards to Play</label>
        <input type="number" id="aTotalBoards" value="${s.totalBoards||24}" min="4" max="120" oninput="adminUpdateCalc()">
        <div style="font-size:0.72rem;color:var(--text3);margin-top:3px;" id="bprHint">→ ${s.boardsPerRound||3} boards/round × ${s.roundCount||tableCount||8} rounds</div>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Boards per Round</label>
        <input type="number" id="aBPR" value="${s.boardsPerRound||3}" min="1" max="8" oninput="adminUpdateCalc()">
      </div>
      <div class="field">
        <label>Scoring</label>
        <select id="aScoring">
          <option value="MP" ${s.scoring!=='IMP'?'selected':''}>Matchpoints (MP)</option>
          <option value="IMP" ${s.scoring==='IMP'?'selected':''}>IMPs</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Movement</label>
      <select id="aMovement">
        <option value="mitchell" ${s.movement==='mitchell'?'selected':''}>Mitchell (NS fixed, EW moves)</option>
        <option value="howell" ${s.movement==='howell'?'selected':''}>Howell (all pairs move)</option>
      </select>
    </div>
    <button class="btn btn-gold btn-full" onclick="adminSetup()" style="margin-bottom:6px;">🚀 Create Tournament</button>
  </div>
  <div class="card">
    <div class="card-title"><span>🎮</span> Round Control</div>
    ${(()=>{
      if(s.status!=='running')return '';
      const boards=getBoards();const movements=getMovements();
      let totalBoards=0,doneBoards=0;
      for(let t=1;t<=s.tableCount;t++){
        const m=movements[s.currentRound+'_'+t]||{};
        for(let b=m.boardStart||1;b<=(m.boardEnd||3);b++){
          totalBoards++;
          if(boards[t+'_'+s.currentRound+'_'+b]?.status==='done')doneBoards++;
        }
      }
      const allDone=totalBoards>0&&doneBoards>=totalBoards;
      if(allDone&&s.currentRound<s.roundCount){
        return`<div style="background:rgba(76,175,125,0.15);border:2px solid var(--green);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;">
          <span style="font-size:1.5rem;">✅</span>
          <div><div style="font-weight:700;color:var(--green);font-size:0.88rem;">Tüm masalar Round ${s.currentRound} bitti!</div>
          <div style="font-size:0.76rem;color:var(--text2);margin-top:2px;">${doneBoards}/${totalBoards} board tamamlandı. Round ${s.currentRound+1} başlatabilirsiniz.</div></div>
        </div>`;
      }
      if(allDone&&s.currentRound>=s.roundCount){
        return`<div style="background:rgba(201,168,76,0.15);border:2px solid var(--gold);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;">
          <span style="font-size:1.5rem;">🏁</span>
          <div><div style="font-weight:700;color:var(--gold);font-size:0.88rem;">Turnuva bitti!</div>
          <div style="font-size:0.76rem;color:var(--text2);margin-top:2px;">Tüm roundlar tamamlandı. Turnuvayı bitirebilirsiniz.</div></div>
        </div>`;
      }
      return`<div style="font-size:0.78rem;color:var(--text2);margin-bottom:8px;">Round ${s.currentRound}: ${doneBoards}/${totalBoards} board tamamlandı</div>`;
    })()}
    <div class="round-card">
      <div class="rc-head">
        <span class="rc-num">Round ${s.currentRound||0} / ${s.roundCount||0}</span>
        <span class="rc-stat">${s.status==='running'?'🟢 Running':s.status==='setup'?'⏳ Setup':'🏁 Finished'} &nbsp;|&nbsp; ${s.scoring||'MP'}</span>
      </div>
      <div class="round-progress"><div class="round-bar" style="width:${s.roundCount?(s.currentRound/s.roundCount*100):0}%"></div></div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;">
      ${s.status==='setup'&&s.roundCount>0?`<button class="btn btn-green btn-full" onclick="adminStart()">▶ Start Round 1</button>`:''}
      ${s.status==='running'&&s.currentRound<s.roundCount?`<button class="btn btn-gold" onclick="adminNextRound()">⏭ Next Round (${s.currentRound+1})</button>`:''}
      ${s.status==='running'&&s.currentRound>=s.roundCount?`<button class="btn btn-blue" onclick="adminFinish()">🏁 Finish Tournament</button>`:''}
    </div>
  </div>
  <div class="card">
    <div class="card-title"><span>💾</span> Data</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;">
      <button class="btn btn-blue" onclick="adminExport()">⬇ Export</button>
      <button class="btn btn-purple" onclick="adminImportOpen()">⬆ Import</button>
      <button class="btn btn-red" onclick="adminReset()">🗑 Reset</button>
    </div>
  </div>`;
}

window.adminUpdateCalc=function(){
  const players=parseInt(document.getElementById('aPlayers')?.value||0);
  const totalB=parseInt(document.getElementById('aTotalBoards')?.value||24);
  const bpr=parseInt(document.getElementById('aBPR')?.value||3);
  const tables=Math.floor(players/4);
  const hasPhantom=players%4!==0;
  const rounds=tables||8;
  const hint=document.getElementById('calcHint');
  const bprHint=document.getElementById('bprHint');
  if(hint)hint.textContent=`→ ${tables} tables${hasPhantom?' + phantom pair':''}`;
  if(bprHint)bprHint.textContent=`→ ${bpr} boards/round × ${rounds} rounds = ${bpr*rounds} total slots`;
};

window.adminSetup=function(){
  const now=new Date();
  const pad=n=>String(n).padStart(2,'0');
  const autoName=now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate())+' '+pad(now.getHours())+':'+pad(now.getMinutes());
  document.getElementById('aName').value=autoName;
  const name=autoName;
  const players=parseInt(document.getElementById('aPlayers').value);
  const totalBoards=parseInt(document.getElementById('aTotalBoards').value);
  const bpr=parseInt(document.getElementById('aBPR').value);
  const scoring=document.getElementById('aScoring').value;
  const mov=document.getElementById('aMovement').value;
  if(isNaN(players)||players<4){toast('❌ Min 4 players');return;}
  if(isNaN(totalBoards)||totalBoards<4){toast('❌ Min 4 boards');return;}
  if(isNaN(bpr)||bpr<1||bpr>8){toast('❌ Boards/round: 1-8');return;}
  const tables=Math.floor(players/4);
  const phantom=players%4!==0;
  if(tables<2){toast('❌ Need at least 8 players (2 tables)');return;}

  let result;
  if(mov==='mitchell'){result=generateMitchell(tables,bpr,phantom,totalBoards);}
  else{result=generateHowell(tables,bpr,totalBoards);}
  setMovements(result.movements);setPairs(result.pairs);setBoards({});setApprovals({});
  const s=getState();
  s.name=name;s.tableCount=tables;s.boardsPerRound=bpr;s.totalBoards=totalBoards;
  s.roundCount=result.rounds;s.phantom=phantom;s.status='setup';s.currentRound=0;
  s.movement=mov;s.scoring=scoring;s._setupPlayers=players;
  setState(s);
  addLog('ok','Tournament created',`${players} players, ${tables} tables, ${result.rounds} rounds, ${mov}, ${scoring}`);
  toast('✅ Tournament created! Enter player names in the Players tab.');
  adminTab='players';
  refreshTopbar();renderAdminPanel();
};

window.adminStart=function(){
  const s=getState();if(s.status!=='setup'){toast('Already started');return;}
  s.currentRound=1;s.status='running';setState(s);
  addLog('ok','Round 1 started','Tournament begins');
  toast('▶ Round 1 started!');refreshTopbar();renderAdminTab();
  adminSetupAutoRefresh();
};
window.adminNextRound=function(){
  const s=getState();
  if(s.currentRound>=s.roundCount){toast('Last round!');return;}
  s.currentRound++;setState(s);
  addLog('ok','Round '+s.currentRound+' started','');
  toast('▶ Round '+s.currentRound+' started!');refreshTopbar();renderAdminTab();
};

let adminRefreshTimer=null;
function adminSetupAutoRefresh(){
  if(adminRefreshTimer)clearInterval(adminRefreshTimer);
  adminRefreshTimer=setInterval(()=>{
    if(adminTab==='setup'&&role==='admin'){
      const c=document.getElementById('adminContent');
      if(c)c.innerHTML=renderSetup();
    }
  },5000);
}
window.adminFinish=function(){
  if(!confirm('Finish tournament?'))return;
  const s=getState();
  const arc=getArchives();
  arc.unshift({state:{...s},boards:getBoards(),pairs:getPairs(),movements:getMovements(),finished:new Date().toISOString()});
  setArchives(arc);s.status='finished';setState(s);
  addLog('ok','Tournament finished & archived','');
  toast('🏁 Tournament finished!');renderAdminTab();
};
window.adminExport=function(){
  const data={state:getState(),pairs:getPairs(),boards:getBoards(),movements:getMovements(),logs:getLogs()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download='bridgemate_'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(url);
  toast('✅ Exported');
};

window.adminImportFile=function(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>{try{applyImport(JSON.parse(e.target.result));}catch{toast('❌ Invalid JSON');}};r.readAsText(f);
};
window.adminImportJson=function(){
  const raw=document.getElementById('impJson').value.trim();
  if(!raw){toast('❌ Paste JSON first');return;}
  try{applyImport(JSON.parse(raw));}catch{toast('❌ Invalid JSON');}
};
function applyImport(data){
  if(!data.state){toast('❌ Invalid file');return;}
  if(data.state)setState(data.state);if(data.pairs)setPairs(data.pairs);
  if(data.boards)setBoards(data.boards);if(data.movements)setMovements(data.movements);
  addLog('ok','Data imported','');closeModal();toast('✅ Imported!');refreshTopbar();renderAdminTab();
}
window.adminReset=function(){
  if(!confirm('DELETE ALL DATA? This cannot be undone.'))return;
  ['state','pairs','boards','movements','logs','approvals'].forEach(k=>DB.del(k));
  toast('🗑 Reset complete');refreshTopbar();renderAdminTab();
};

function splitPairName(name){
  // Split "Alice Smith & Bob Jones" → ["Alice Smith","Bob Jones"]
  if(!name)return['',''];
  const parts=name.split(' & ');
  return[parts[0]||'',parts[1]||''];
}
function joinPairName(p1,p2){
  const a=(p1||'').trim();const b=(p2||'').trim();
  if(a&&b)return a+' & '+b;
  return a||b||'';
}

      <div style="display:flex;gap:6px;flex-wrap:wrap;">

window.updatePairName=function(id,name){const p=getPairs();if(p[id]){p[id].name=name.trim();setPairs(p);}};

window.updatePairSlot=function(id,slot,val){
  const p=getPairs();if(!p[id])return;
  const [p1,p2]=splitPairName(p[id].name);
  p[id].name=slot===1?joinPairName(val,p2):joinPairName(p1,val);
  setPairs(p);
};

window.addPlayer=function(){
  const p=getPairs();
  const s=getState();
  // Determine next available ID
  const nsKeys=Object.keys(p).filter(k=>k.startsWith('ns_'));
  const ewKeys=Object.keys(p).filter(k=>k.startsWith('ew_'));
  const pKeys=Object.keys(p).filter(k=>k.startsWith('p')&&!k.startsWith('phantom'));
  // For mitchell: add ns+ew pair; for howell: add p pair
  const mov=s.movement||'mitchell';
  if(mov==='mitchell'){
    const nextNS=nsKeys.length+1;
    const nextEW=ewKeys.length+1;
    if(nextNS!==nextEW){toast('❌ NS/EW counts mismatch — cannot add');return;}
    openModal('Add Player Pair',`
      <p style="font-size:0.82rem;color:var(--text2);margin-bottom:12px;">Adding Table ${nextNS} (NS + EW pair)</p>
      <div class="field"><label>NS Player Name</label><input id="addNsName" placeholder="Full Name" autofocus></div>
      <div class="field"><label>EW Player Name</label><input id="addEwName" placeholder="Full Name"></div>`,
      `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
       <button class="btn btn-green" onclick="confirmAddMitchell(${nextNS})">Add</button>`);
  } else {
    const next=pKeys.length+1;
    openModal('Add Player Pair',`
      <p style="font-size:0.82rem;color:var(--text2);margin-bottom:12px;">Adding Pair ${next}</p>
      <div class="field"><label>Player Name</label><input id="addPName" placeholder="Full Name" autofocus></div>`,
      `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
       <button class="btn btn-green" onclick="confirmAddHowell(${next})">Add</button>`);
  }
};

window.confirmAddMitchell=function(n){
  const nsName=document.getElementById('addNsName')?.value.trim()||('NS '+n);
  const ewName=document.getElementById('addEwName')?.value.trim()||('EW '+n);
  const p=getPairs();
  p['ns_'+n]={id:'ns_'+n,name:nsName,dir:'NS',startTable:n,isPhantom:false};
  p['ew_'+n]={id:'ew_'+n,name:ewName,dir:'EW',startTable:n,isPhantom:false};
  setPairs(p);
  addLog('ok','Player pair added','NS: '+nsName+' / EW: '+ewName);
  toast('✅ Added: '+nsName+' & '+ewName);
  closeModal();renderAdminTab();
};

window.confirmAddHowell=function(n){
  const name=document.getElementById('addPName')?.value.trim()||('Pair '+n);
  const p=getPairs();
  p['p'+n]={id:'p'+n,name:name,dir:'',startTable:0,isPhantom:false};
  setPairs(p);
  addLog('ok','Player added','Pair '+n+': '+name);
  toast('✅ Added: '+name);
  closeModal();renderAdminTab();
};

window.removePlayer=function(id){
  const p=getPairs();
  const name=p[id]?.name||id;
  if(!confirm('Remove "'+name+'"? This cannot be undone.'))return;
  // For mitchell, remove the paired EW or NS too
  const s=getState();
  const mov=s.movement||'mitchell';
  if(mov==='mitchell'){
    const num=id.split('_')[1];
    const paired=id.startsWith('ns_')?'ew_'+num:'ns_'+num;
    if(p[paired]&&confirm('Also remove paired player "'+p[paired].name+'"?')){
      delete p[paired];
    }
  }
  delete p[id];
  setPairs(p);
  addLog('warn','Player removed',name);
  toast('🗑 Removed: '+name);
  renderAdminTab();
};;
window.adminBulkNames=function(){
  const raw=document.getElementById('bulkNames').value.trim();
  if(!raw){toast('❌ Önce isim girin');return;}
  const names=raw.split('\n').map(s=>s.trim()).filter(Boolean);
  const p=getPairs();
  const nsKeys=Object.keys(p).filter(k=>k.startsWith('ns_')).sort((a,b)=>parseInt(a.split('_')[1])-parseInt(b.split('_')[1]));
  const ewKeys=Object.keys(p).filter(k=>k.startsWith('ew_')).sort((a,b)=>parseInt(a.split('_')[1])-parseInt(b.split('_')[1]));
  const pKeys=Object.keys(p).filter(k=>k.startsWith('p')&&!k.startsWith('phantom')).sort((a,b)=>parseInt(a.slice(1))-parseInt(b.slice(1)));
  let i=0;
  [...nsKeys,...ewKeys,...pKeys].forEach(k=>{
    const n1=names[i++]||'';const n2=names[i++]||'';
    p[k].name=joinPairName(n1,n2);
  });
  setPairs(p);addLog('ok','Toplu isim yüklendi',`${i} isim`);toast(`✅ ${i} isim yüklendi`);renderAdminTab();
};
const DEMO_NAMES=['Alice Johnson','Bob Smith','Carol White','David Brown','Emma Davis','Frank Miller','Grace Wilson','Henry Taylor','Iris Anderson','Jack Martin','Kate Thompson','Liam Garcia','Mia Martinez','Noah Lee','Olivia Harris','Paul Clark','Quinn Lewis','Rachel Walker','Sam Hall','Tina Allen','Uma Young','Victor King','Wendy Wright','Xavier Scott'];
window.adminRandomNames=function(){
  const p=getPairs();const shuffled=[...DEMO_NAMES].sort(()=>Math.random()-0.5);
  const allKeys=Object.keys(p).filter(k=>!p[k].isPhantom).sort();let i=0;
  allKeys.forEach(k=>{if(shuffled[i])p[k].name=shuffled[i++];});

window.adminParseHandsText=function(){
  const raw=(document.getElementById('handsText').value||'').trim();
  if(!raw){toast('❌ File is empty');return;}
  const hands=parsePBNorLIN(raw);
  if(!hands.length){toast('❌ Format not recognised');return;}
  // Store as bm_hands
  localStorage.setItem('bm_hands',JSON.stringify(hands));
  addLog('ok','Hand file loaded',hands.length+' board hand records');
  toast('✅ '+hands.length+' hands loaded!');
  closeModal();renderAdminTab();

function parsePBNorLIN(raw){
  const hands=[];
  // Try PBN
  if(raw.indexOf('[Board')!==-1){
    const blocks=raw.split(/(?=\[Board )/i).filter(Boolean);
    blocks.forEach(bl=>{
      const bm=bl.match(/\[Board "([^"]+)"\]/i);
      const dm=bl.match(/\[Deal "([^"]+)"\]/i);
      const vm=bl.match(/\[Vulnerable "([^"]+)"\]/i);
      const fm=bl.match(/\[Dealer "([^"]+)"\]/i);
      if(bm&&dm){
        hands.push({board:bm[1],deal:dm[1],vulnerable:vm?vm[1]:'None',dealer:fm?fm[1]:'N'});
      }
    });
    return hands;
  }
  // Try LIN
  if(raw.indexOf('md|')!==-1||raw.indexOf('pn|')!==-1){
    const lines=raw.split(/\r?\n/).filter(Boolean);
    lines.forEach((ln,i)=>{
      const md=ln.match(/md\|([^|]+)/);
      if(md){hands.push({board:String(i+1),deal:'LIN:'+md[1],vulnerable:'None',dealer:'N'});}
    });
    return hands;
  }
  // Try CSV
  if(raw.indexOf(',')!==-1){
    const rows=raw.split(/\r?\n/).filter(Boolean);
    const header=rows[0].toLowerCase();
    if(header.indexOf('board')!==-1){
      rows.slice(1).forEach(row=>{
        const cols=row.split(',');
        if(cols.length>=2)hands.push({board:cols[0].trim(),deal:cols.slice(1).join(','),vulnerable:'None',dealer:'N'});
      });
      return hands;
    }
  }
  return hands;
}

    rankRows+=`<tr style="background:${bg}"><td style="font-weight:700;">${idx+1}</td><td style="font-weight:600;">${r.name}</td><td style="color:${r.dir==='NS'?'#1565c0':'#e65100'};">${r.dir}</td><td style="font-weight:700;">${r.mp}</td><td style="font-weight:700;color:${r.pct>=60?'#2e7d32':r.pct>=45?'#e65100':'#c62828'};">${r.pct}%</td></tr>`;
  });
  const bkeys=Object.keys(a.boards||{}).filter(k=>a.boards[k].status==='done').sort();
  let bRows='';
  bkeys.forEach(k=>{
    const d=a.boards[k];const[t,r,b]=k.split('_');
    const m=(a.movements||{})[r+'_'+t]||{};
    const ns=pairs[m.ns]||{name:m.ns||'?'};const ew=pairs[m.ew]||{name:m.ew||'?'};
    const sc=typeof d.nsScore==='number'?((d.nsScore>0?'+':'')+d.nsScore):d.nsScore||'?';
    const bg=typeof d.nsScore==='number'?(d.nsScore>0?'#e8f5e9':d.nsScore<0?'#ffebee':'#fff8e1'):'#f5f5f5';
    bRows+=`<tr style="background:${bg}"><td>M${t}/T${r}/B${b}</td><td>${ns.name}</td><td>${ew.name}</td><td style="font-family:monospace;">${d.contract||'PASS'}</td><td style="font-family:monospace;">${d.lead||'-'}</td><td style="font-weight:700;">${sc}</td></tr>`;
  });
  const st=a.state||{};
  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${st.name} Results</title>
  <style>body{font-family:Arial,sans-serif;font-size:11px;margin:16px;color:#222;}h1{font-size:17px;color:#1a237e;margin-bottom:3px;}h2{font-size:12px;color:#1a237e;border-bottom:1px solid #1a237e;padding-bottom:2px;margin:14px 0 5px;}.meta{font-size:10px;color:#666;margin-bottom:12px;}table{width:100%;border-collapse:collapse;margin-bottom:10px;}th{background:#1a237e;color:#fff;padding:4px 7px;text-align:left;font-size:9px;text-transform:uppercase;}td{padding:4px 7px;border-bottom:1px solid #e0e0e0;}</style>
  </head><body>
  <h1>♠ ${st.name||'Tournament'}</h1>
  <div class="meta">${st.tableCount||'?'} tables · ${st.roundCount||'?'} rounds · ${st.scoring||'MP'} · Finished: ${a.finished?new Date(a.finished).toLocaleString('tr-TR'):''}</div>
  <h2>Overall Rankings</h2>
  <table><thead><tr><th>#</th><th>Full Name</th><th>Dir</th><th>MP</th><th>%</th></tr></thead><tbody>${rankRows}</tbody></table>
  <h2>Board Results (${bkeys.length} boards)</h2>
  <table><thead><tr><th>Table/Round/B</th><th>NS</th><th>EW</th><th>Contract</th><th>Opening Lead</th><th>NS Score</th></tr></thead><tbody>${bRows}</tbody></table>
  <script>window.onload=function(){window.print();}<\/script>
  </body></html>`);
  win.document.close();
};

function calcMPFromData(boards,movements){
  const boardScores={};
  Object.entries(boards).forEach(([key,b])=>{
    if(b.status!=='done')return;const[t,r,bn]=key.split('_');
    if(!boardScores[bn])boardScores[bn]=[];const m=movements[r+'_'+t]||{};
    if(typeof b.nsScore!=='number')return;
    boardScores[bn].push({ns:m.ns,ew:m.ew,nsScore:b.nsScore});
  });
  const pairMP={};
  Object.entries(boardScores).forEach(([,scores])=>{
    const n=scores.length;if(n<2)return;const top=(n-1)*2;
    scores.forEach(s=>{let nsMP=0,ewMP=0;scores.forEach(s2=>{if(s===s2)return;if(s.nsScore>s2.nsScore)nsMP+=2;else if(s.nsScore===s2.nsScore){nsMP++;ewMP++;}else ewMP+=2;});
      if(s.ns){if(!pairMP[s.ns])pairMP[s.ns]={mp:0,boards:0,top:0};pairMP[s.ns].mp+=nsMP;pairMP[s.ns].boards++;pairMP[s.ns].top+=top;}
      if(s.ew){if(!pairMP[s.ew])pairMP[s.ew]={mp:0,boards:0,top:0};pairMP[s.ew].mp+=ewMP;pairMP[s.ew].boards++;pairMP[s.ew].top+=top;}
    });
  });
  return pairMP;
}

window.secChangeAdmin=async function(){
  const oldPw=document.getElementById('secAdminOld').value;
  const newPw=document.getElementById('secAdminNew').value.trim();
  const newPw2=document.getElementById('secAdminNew2').value.trim();
  if(!oldPw||!newPw||!newPw2){toast('❌ Fill all fields');return;}
  if(newPw.length<4){toast('❌ Min 4 characters');return;}
  if(newPw!==newPw2){toast('❌ Passwords do not match');return;}
  const PASS=await loadPasswords();
  if(oldPw!==PASS.admin){toast('❌ Current password incorrect');return;}
  try{
    await savePasswords(newPw, PASS.table);
    toast('✅ Admin password updated');
    ['secAdminOld','secAdminNew','secAdminNew2'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  }catch(e){toast('❌ Firebase error: '+e.message);}
};

window.secChangeTable=async function(){
  const auth=document.getElementById('secTableAuth').value;
  const newPw=document.getElementById('secTableNew').value.trim();

};
